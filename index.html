<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3a5a40">
<title>中医学习助手</title>
<style>
/* ==================== 全局样式与适老化设计 ==================== */
:root{
  /* 温暖配色：宣纸米白 + 墨绿主色 + 暖棕 */
  --bg:#f5f0e6;            /* 宣纸米白背景 */
  --panel:#fcf9f2;        /* 面板更浅 */
  --ink:#2b2b26;          /* 墨色文字 */
  --ink-soft:#5c574d;     /* 次要文字 */
  --primary:#3a5a40;      /* 墨绿主色 */
  --primary-dark:#2c4632;
  --primary-soft:#dfe7df;
  --accent:#9c6644;       /* 暖棕 */
  --accent-soft:#e8dccb;
  --line:#d8cfbd;         /* 分隔线 */
  --user-bub:#e7efe4;     /* 用户气泡 */
  --ai-bub:#fbf7ee;       /* AI气泡 */
  --danger:#a23b2d;
  --warn:#b07d2b;
  --shadow:0 2px 10px rgba(60,50,30,.12);
  --radius:14px;
  /* 字号系统，默认"大" */
  --fs-base:20px;
  --fs-sm:17px;
  --fs-lg:23px;
  --fs-title:27px;
}
html[data-fontsize="标准"]{--fs-base:18px;--fs-sm:15px;--fs-lg:20px;--fs-title:24px;}
html[data-fontsize="大"]{--fs-base:20px;--fs-sm:17px;--fs-lg:23px;--fs-title:27px;}
html[data-fontsize="特大"]{--fs-base:24px;--fs-sm:20px;--fs-lg:28px;--fs-title:32px;}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:"PingFang SC","Microsoft YaHei","Source Han Sans CN",sans-serif;
  font-size:var(--fs-base);
  line-height:1.75;
  color:var(--ink);
  background:var(--bg);
  overflow:hidden;
}
.serif{font-family:"Songti SC","STSong","SimSun","Noto Serif SC",serif;}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:var(--ink);}

/* 按钮最小点击区 44px */
.btn{
  min-height:48px;min-width:48px;padding:10px 18px;border-radius:var(--radius);
  background:var(--primary);color:#fff;font-weight:600;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;transition:.15s;box-shadow:var(--shadow);
}
.btn:active{transform:scale(.97);}
.btn.ghost{background:var(--panel);color:var(--primary);border:2px solid var(--primary-soft);box-shadow:none;}
.btn.warm{background:var(--accent);}
.btn.danger{background:var(--danger);}
.btn.small{min-height:40px;padding:6px 14px;font-size:var(--fs-sm);}

/* ==================== 总体布局 ==================== */
#app{display:flex;height:100%;position:relative;}

/* 侧边栏 */
#sidebar{
  width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;height:100%;transition:margin-left .25s ease;z-index:40;
}
#sidebar.collapsed{margin-left:-300px;}
.sb-head{padding:16px;border-bottom:1px solid var(--line);}
.sb-title{font-size:var(--fs-lg);font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;}
.sb-tabs{display:flex;border-bottom:1px solid var(--line);}
.sb-tab{flex:1;padding:12px 8px;font-weight:700;color:var(--ink-soft);border-bottom:3px solid transparent;font-size:var(--fs-sm);}
.sb-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-soft);}
.sb-pane{flex:1;display:flex;flex-direction:column;min-height:0;}
.sb-list{flex:1;overflow-y:auto;padding:8px;}
/* 患者卡片 */
.pat-item{padding:12px 14px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;border:2px solid transparent;}
.pat-item:hover{background:var(--accent-soft);}
.pat-item.active{background:var(--accent-soft);border-color:var(--accent);}
.pat-item .title{font-weight:700;color:var(--ink);}
.pat-item .meta{font-size:var(--fs-sm);color:var(--ink-soft);display:flex;justify-content:space-between;margin-top:2px;}
/* 患者关联横幅 */
.pat-banner{
  max-width:920px;margin:0 auto 14px;background:var(--accent-soft);border:1px solid var(--accent);
  border-radius:12px;padding:10px 16px;color:var(--accent);font-weight:600;cursor:pointer;font-size:var(--fs-sm);
}
.pat-banner:hover{filter:brightness(.97);}
/* 患者详情 / 就诊时间线 */
.pat-info-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.pat-info-grid .row{display:flex;gap:10px;}
.pat-info-grid label{flex:0 0 96px;font-weight:700;color:var(--primary);padding-top:11px;}
.pat-info-grid input,.pat-info-grid textarea{
  flex:1;padding:11px 12px;border-radius:12px;border:2px solid var(--line);background:#fff;outline:none;
}
.visit-card{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:#fff;overflow:hidden;}
.visit-card .vc-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--bg);}
.visit-card .vc-date{font-weight:700;color:var(--primary);}
.visit-card .vc-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .2s;}
.visit-card.open .vc-body{max-height:none;padding:14px 16px;}
.visit-card .vc-text{white-space:pre-wrap;line-height:1.7;}
.visit-card .vc-acts{display:flex;gap:10px;margin-top:12px;}
.draft-area{width:100%;min-height:280px;padding:14px;border-radius:12px;border:2px solid var(--line);background:#fff;line-height:1.7;resize:vertical;}
.sess-item{
  padding:12px 14px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;
  display:flex;flex-direction:column;gap:2px;border:2px solid transparent;
}
.sess-item:hover{background:var(--primary-soft);}
.sess-item.active{background:var(--primary-soft);border-color:var(--primary);}
.sess-item .title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-item .meta{font-size:var(--fs-sm);color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center;}
.sess-acts{display:none;gap:6px;}
.sess-item:hover .sess-acts,.sess-item.active .sess-acts{display:flex;}
.sess-acts button{font-size:var(--fs-sm);color:var(--ink-soft);padding:4px 6px;border-radius:8px;}
.sess-acts button:hover{background:var(--bg);color:var(--primary);}

.sb-foot{border-top:1px solid var(--line);padding:14px;display:flex;flex-direction:column;gap:10px;}
.quota-box{font-size:var(--fs-sm);color:var(--ink-soft);}
.quota-bar{height:12px;background:var(--accent-soft);border-radius:6px;overflow:hidden;margin-top:4px;}
.quota-fill{height:100%;background:var(--primary);width:0%;transition:width .3s;}
.quota-fill.warn{background:var(--warn);}
.quota-fill.over{background:var(--danger);}

/* 主区 */
#main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;position:relative;}
.topbar{
  display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--panel);
  border-bottom:1px solid var(--line);min-height:64px;
}
.icon-btn{
  min-width:48px;min-height:48px;border-radius:var(--radius);display:flex;align-items:center;
  justify-content:center;font-size:24px;background:var(--bg);border:1px solid var(--line);
}
.icon-btn:active{background:var(--primary-soft);}
.conv-title{flex:1;font-size:var(--fs-lg);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--primary);}

/* 模型切换开关 */
.model-switch{
  display:flex;align-items:center;background:var(--bg);border:2px solid var(--primary-soft);
  border-radius:999px;padding:4px;gap:2px;cursor:pointer;user-select:none;
}
.model-switch .opt{
  padding:8px 14px;border-radius:999px;font-size:var(--fs-sm);font-weight:600;color:var(--ink-soft);
  white-space:nowrap;transition:.15s;
}
.model-switch .opt.on{background:var(--primary);color:#fff;}
.model-switch .opt.on.flash{background:var(--accent);}

/* 消息流 */
#stream{flex:1;overflow-y:auto;padding:18px 14px 18px;scroll-behavior:smooth;}

/* 日期分隔条（居中） */
.date-sep{
  max-width:920px;margin:6px auto 22px;display:flex;align-items:center;gap:14px;
  color:var(--ink-soft);font-size:var(--fs-sm);
}
.date-sep::before,.date-sep::after{content:"";flex:1;height:1px;background:var(--line);}
.date-sep span{
  background:var(--accent-soft);color:var(--accent);border-radius:999px;
  padding:4px 16px;font-weight:600;white-space:nowrap;
}

/* 经典聊天气泡：用户靠右、AI 靠左 */
.msg{display:flex;gap:12px;margin-bottom:22px;max-width:920px;margin-left:auto;margin-right:auto;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}

/* CSS 画的头像：用户=圆形，AI=圆角方形（不用 emoji） */
.msg .avatar{
  width:44px;height:44px;min-width:44px;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:var(--fs-sm);color:#fff;
  font-family:"Songti SC","Noto Serif SC",serif;
}
.msg.ai .avatar{
  border-radius:12px;background:var(--accent);  /* 圆角方形 */
}
.msg.user .avatar{
  border-radius:50%;background:var(--primary);  /* 圆形 */
}

.msg .body{display:flex;flex-direction:column;min-width:0;max-width:78%;}
.msg.user .body{align-items:flex-end;}
.msg.ai .body{align-items:flex-start;}
.msg .bubble{
  background:var(--ai-bub);border:1px solid var(--line);
  border-radius:16px 16px 16px 4px;  /* AI：左下角小，像从左侧伸出 */
  padding:14px 18px;box-shadow:var(--shadow);overflow-wrap:break-word;max-width:100%;
}
.msg.user .bubble{
  background:var(--user-bub);
  border-radius:16px 16px 4px 16px;  /* 用户：右下角小 */
}
.msg .time{font-size:var(--fs-sm);color:var(--ink-soft);margin-bottom:4px;padding:0 4px;}
.msg-acts{margin-top:6px;display:flex;gap:10px;}
.msg-acts button{font-size:var(--fs-sm);color:var(--primary);padding:4px 0;}
.msg-acts button:hover{text-decoration:underline;}

/* Markdown 渲染样式 */
.bubble h1,.bubble h2,.bubble h3{color:var(--primary);margin:.6em 0 .3em;font-family:"Songti SC","Noto Serif SC",serif;}
.bubble h1{font-size:1.3em;}.bubble h2{font-size:1.2em;}.bubble h3{font-size:1.1em;}
.bubble p{margin:.5em 0;}
.bubble ul,.bubble ol{margin:.5em 0;padding-left:1.5em;}
.bubble li{margin:.25em 0;}
.bubble code{background:var(--accent-soft);padding:2px 6px;border-radius:6px;font-family:monospace;font-size:.92em;}
.bubble pre{background:#2b2b26;color:#f5f0e6;padding:12px;border-radius:10px;overflow-x:auto;}
.bubble pre code{background:none;color:inherit;padding:0;}
.bubble blockquote{border-left:4px solid var(--accent);margin:.6em 0;padding:4px 14px;color:var(--ink-soft);background:var(--accent-soft);border-radius:0 8px 8px 0;}
.bubble strong{color:var(--primary-dark);}
.bubble table{border-collapse:collapse;margin:.6em 0;width:100%;}
.bubble th,.bubble td{border:1px solid var(--line);padding:6px 10px;text-align:left;}
.bubble th{background:var(--primary-soft);}
.typing-cursor{display:inline-block;width:8px;height:1.1em;background:var(--primary);vertical-align:text-bottom;animation:blink 1s steps(2) infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* 输入区 */
.composer{border-top:1px solid var(--line);background:var(--panel);padding:10px 14px 14px;}
.tpl-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:thin;}
.tpl-bar::-webkit-scrollbar{height:6px;}
.tpl-bar::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.tpl-btn{
  min-height:46px;padding:8px 16px;border-radius:999px;background:var(--bg);
  border:2px solid var(--primary-soft);color:var(--primary);font-weight:600;white-space:nowrap;flex-shrink:0;
}
.tpl-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);}
.tpl-btn.free.on{background:var(--accent);border-color:var(--accent);}
/* 「更多」折叠弹层：用 fixed 定位，避免被 .tpl-bar 的 overflow-x 裁切 */
.tpl-more-wrap{position:relative;flex-shrink:0;}
.tpl-more-pop{
  position:fixed;background:var(--panel);border:2px solid var(--primary-soft);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:8px;display:none;flex-direction:column;gap:6px;z-index:120;min-width:220px;max-width:86vw;
}
.tpl-more-pop.show{display:flex;}
.tpl-more-pop .tpl-btn{width:100%;justify-content:flex-start;}
/* 说明卡内部 */
.tpl-card-brief{font-size:var(--fs-lg);color:var(--ink);margin-bottom:6px;}
.tpl-card-sub{font-size:var(--fs-sm);color:var(--ink-soft);margin:14px 0 6px;font-weight:700;}
.tpl-eg{
  display:block;width:100%;text-align:left;background:var(--bg);border:2px solid var(--primary-soft);
  border-radius:12px;padding:11px 14px;margin-bottom:8px;color:var(--primary);font-weight:600;line-height:1.5;
}
.tpl-eg:active{transform:scale(.99);}
.tpl-card-full summary{cursor:pointer;color:var(--accent);font-weight:600;margin-top:8px;}
.tpl-card-full pre{
  white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:12px;margin-top:8px;font-family:inherit;font-size:var(--fs-sm);color:var(--ink-soft);line-height:1.6;
}
.composer-row2{display:flex;gap:8px;margin-bottom:8px;}
.inquiry-btn{flex-shrink:0;}
.active-tpl-tag{
  font-size:var(--fs-sm);color:var(--accent);font-weight:600;display:flex;align-items:center;gap:6px;
}
.active-tpl-tag .x{cursor:pointer;padding:2px 6px;border-radius:6px;background:var(--accent-soft);}
/* 图片待发缩略图区 */
.img-staging{display:flex;gap:10px;flex-wrap:wrap;padding:6px 2px 10px;}
.img-thumb{position:relative;width:84px;height:84px;border-radius:12px;overflow:hidden;border:2px solid var(--primary-soft);background:#fff;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb .rm{position:absolute;top:2px;right:2px;width:26px;height:26px;border-radius:50%;background:rgba(40,35,25,.72);color:#fff;font-size:18px;line-height:26px;text-align:center;cursor:pointer;}
.img-thumb .rm:hover{background:var(--danger);}
/* 气泡内图片 */
.bubble-imgs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.bubble-imgs img{max-width:160px;max-height:160px;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;object-fit:cover;}
/* 系统小提示（如 key 切换） */
.sys-tip{max-width:920px;margin:0 auto 18px;text-align:center;}
.sys-tip span{display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:6px 16px;font-size:var(--fs-sm);font-weight:600;}
/* lightbox 放大查看 */
#lightbox{position:fixed;inset:0;background:rgba(20,16,10,.88);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#lightbox.show{display:flex;}
#lightbox img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
#lightbox .lb-x{position:fixed;top:16px;right:20px;font-size:40px;color:#fff;cursor:pointer;line-height:1;}
.input-wrap{display:flex;gap:10px;align-items:flex-end;}
#inputBox{
  flex:1;resize:none;min-height:56px;max-height:200px;padding:14px 16px;border-radius:var(--radius);
  border:2px solid var(--line);background:#fff;line-height:1.6;outline:none;
}
#inputBox:focus{border-color:var(--primary);}
#sendBtn{min-width:90px;height:56px;font-size:var(--fs-lg);}
#sendBtn:disabled{opacity:.5;}

/* 快速导航浮窗 */
#quickNav{
  position:absolute;right:14px;top:80px;width:200px;max-height:60%;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  overflow-y:auto;z-index:30;padding:8px;
}
#quickNav .qn-title{font-size:var(--fs-sm);font-weight:700;color:var(--primary);padding:4px 8px;}
.qn-item{padding:8px 10px;border-radius:8px;font-size:var(--fs-sm);cursor:pointer;color:var(--ink-soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qn-item:hover{background:var(--primary-soft);color:var(--primary);}
#quickNav.hidden{display:none;}
.qn-toggle{position:absolute;right:14px;top:80px;z-index:31;}

/* ==================== 弹层/模态 ==================== */
.overlay{
  position:fixed;inset:0;background:rgba(40,35,25,.5);z-index:100;display:none;
  align-items:center;justify-content:center;padding:16px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--panel);border-radius:18px;max-width:760px;width:100%;max-height:92vh;
  overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.modal-full{max-width:900px;}
.modal-head{
  position:sticky;top:0;background:var(--panel);padding:18px 22px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;z-index:2;
}
.modal-head h2{margin:0;font-size:var(--fs-title);color:var(--primary);}
.modal-body{padding:22px;}
.modal-foot{position:sticky;bottom:0;background:var(--panel);padding:16px 22px;border-top:1px solid var(--line);
  display:flex;gap:12px;justify-content:flex-end;}
.close-x{font-size:30px;line-height:1;color:var(--ink-soft);padding:6px 12px;border-radius:10px;}
.close-x:hover{background:var(--bg);}

/* 设置/表单元素 */
.field{margin-bottom:22px;}
.field label{display:block;font-weight:700;margin-bottom:8px;color:var(--primary);}
.field .hint{font-size:var(--fs-sm);color:var(--ink-soft);margin-bottom:8px;}
.field input[type=text],.field input[type=password],.field input[type=number],.field textarea,.field select{
  width:100%;padding:13px 14px;border-radius:var(--radius);border:2px solid var(--line);background:#fff;outline:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);}

/* chip 点选 */
.chip-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
.chip{
  min-height:46px;padding:9px 18px;border-radius:999px;background:var(--bg);
  border:2px solid var(--line);color:var(--ink);font-weight:600;transition:.12s;
}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}
.chip.on.warm{background:var(--accent);border-color:var(--accent);}
.inq-section{margin-bottom:24px;padding-bottom:18px;border-bottom:1px dashed var(--line);}
.inq-section .sec-label{font-size:var(--fs-lg);font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.font-choose{display:flex;gap:10px;}

/* 问诊单：自填 chip / 行内输入 */
.chip.add-chip{background:var(--accent-soft);border-style:dashed;border-color:var(--accent);color:var(--accent);}
.chip.custom{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip-inline-input{
  min-height:46px;padding:9px 14px;border-radius:999px;border:2px solid var(--accent);
  background:#fff;outline:none;min-width:120px;
}
.inq-hint-sub{font-size:var(--fs-sm);color:var(--ink-soft);margin:2px 0 8px;}

/* 病程演化阶段行 */
.stage-row{display:flex;gap:8px;margin-top:8px;align-items:flex-start;}
.stage-row .st-time{flex:0 0 34%;}
.stage-row .st-chg{flex:1;}
.stage-row input{padding:11px 12px;border-radius:12px;border:2px solid var(--line);background:#fff;width:100%;}
.stage-row .st-del{flex:0 0 auto;min-width:44px;min-height:46px;border-radius:12px;background:var(--bg);border:2px solid var(--line);color:var(--danger);font-weight:700;}
.add-stage-btn{margin-top:10px;background:var(--primary-soft);color:var(--primary);border:2px dashed var(--primary);border-radius:12px;min-height:46px;padding:8px 16px;font-weight:600;}

/* 脉诊展开开关 */
.pulse-toggle{display:flex;align-items:center;gap:10px;margin:10px 0;}
.switch{position:relative;width:54px;height:30px;background:var(--line);border-radius:999px;transition:.2s;flex:0 0 auto;}
.switch.on{background:var(--primary);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;}
.switch.on::after{transform:translateX(24px);}
.pulse-detail{margin-top:8px;}
.pulse-pos{margin-bottom:14px;padding:10px 12px;border-radius:12px;background:var(--bg);border:1px solid var(--line);}
.pulse-pos .pp-label{font-weight:700;color:var(--accent);margin-bottom:6px;}

/* toast 提示 */
#toast{
  position:fixed;left:50%;bottom:40px;transform:translateX(-50%);background:var(--primary-dark);
  color:#fff;padding:14px 26px;border-radius:999px;box-shadow:var(--shadow);z-index:300;
  font-size:var(--fs-base);display:none;max-width:90%;text-align:center;
}
#toast.show{display:block;animation:toastin .3s;}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;}}

/* 右下角错误 toast（全局错误捕获用） */
#errToastWrap{position:fixed;right:16px;bottom:16px;z-index:400;display:flex;flex-direction:column;gap:10px;max-width:min(420px,86vw);}
.err-toast{
  background:var(--danger);color:#fff;border-radius:12px;box-shadow:0 6px 22px rgba(0,0,0,.28);
  padding:12px 14px;display:flex;gap:10px;align-items:flex-start;font-size:var(--fs-sm);line-height:1.5;
  animation:toastin .25s;
}
.err-toast .et-body{flex:1;word-break:break-word;}
.err-toast .et-title{font-weight:700;margin-bottom:2px;}
.err-toast .et-x{cursor:pointer;font-size:22px;line-height:1;padding:0 4px;opacity:.85;flex:0 0 auto;}
.err-toast .et-x:hover{opacity:1;}

/* 确认弹窗 */
.confirm-modal{max-width:440px;text-align:center;}
.confirm-modal .modal-body{font-size:var(--fs-lg);}

/* 空状态 */
.empty-state{
  text-align:center;color:var(--ink-soft);padding:40px 20px;max-width:640px;margin:30px auto;
}
.empty-state .big{font-size:60px;margin-bottom:14px;}
.empty-state h3{color:var(--primary);font-size:var(--fs-title);}
.empty-cards{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:24px;}
.empty-card{
  background:var(--panel);border:2px solid var(--primary-soft);border-radius:var(--radius);
  padding:14px 18px;cursor:pointer;font-weight:600;color:var(--primary);box-shadow:var(--shadow);
}
.empty-card:active{transform:scale(.97);}

/* 多 key 管理 */
.key-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px;}
.key-row .k-idx{font-weight:700;color:var(--accent);min-width:24px;text-align:center;}
.key-row .k-label{flex:0 0 130px;padding:9px 10px;border-radius:10px;border:2px solid var(--line);background:#fff;}
.key-row .k-key{flex:1;min-width:160px;padding:9px 10px;border-radius:10px;border:2px solid var(--line);background:#fff;}
.key-row .k-btn{min-width:42px;min-height:42px;border-radius:10px;border:2px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:700;}
.key-row .k-btn:hover{border-color:var(--primary);color:var(--primary);}
.key-row .k-btn.del:hover{border-color:var(--danger);color:var(--danger);}
.key-used{font-size:var(--fs-sm);color:var(--ink-soft);flex:0 0 auto;}
/* 温度滑块 */
.temp-row{display:flex;align-items:center;gap:14px;margin-top:8px;}
.temp-row input[type=range]{flex:1;height:30px;}
.temp-val{font-weight:700;color:var(--primary);min-width:54px;text-align:center;}
.temp-default{display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:600;color:var(--ink);}
.temp-default input{width:22px;height:22px;}
.temp-row.disabled{opacity:.45;pointer-events:none;}
/* 模板编辑 */
.tpl-edit-ta{width:100%;min-height:240px;padding:12px;border-radius:12px;border:2px solid var(--line);background:#fff;line-height:1.6;resize:vertical;font-family:inherit;}
.tpl-custom-badge{display:inline-block;background:var(--accent);color:#fff;border-radius:999px;padding:2px 10px;font-size:var(--fs-sm);font-weight:600;margin-left:8px;}
/* 用量明细小表 */
.usage-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm);}
.usage-table th,.usage-table td{border:1px solid var(--line);padding:8px 10px;text-align:center;}
.usage-table th{background:var(--primary-soft);}

/* 平板/手机响应式 */
@media(max-width:820px){
  #sidebar{position:absolute;left:0;top:0;bottom:0;box-shadow:var(--shadow);}
  #quickNav{display:none!important;}
  .qn-toggle{display:none;}
}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:35;display:none;}
.backdrop.show{display:block;}
@media(min-width:821px){.backdrop{display:none!important;}}

/* ==================== 题卡（quiz card）样式 ==================== */
.quiz-card{
  background:var(--panel);border:2px solid var(--primary-soft);border-radius:var(--radius);
  margin:14px 0;padding:16px 18px;box-shadow:var(--shadow);
}
.quiz-card .qc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.quiz-card .qc-num{font-weight:700;color:var(--primary);font-size:var(--fs-lg);}
.quiz-card .qc-tag{background:var(--accent-soft);color:var(--accent);border-radius:999px;
  padding:3px 12px;font-size:var(--fs-sm);font-weight:600;}
.quiz-card .qc-stem{font-weight:600;line-height:1.7;margin-bottom:12px;color:var(--ink);}
.quiz-card .qc-options{display:flex;flex-direction:column;gap:8px;}
.qc-opt{
  width:100%;text-align:left;min-height:52px;padding:12px 16px;border-radius:var(--radius);
  background:var(--bg);border:2px solid var(--line);color:var(--ink);font-weight:600;
  font-size:var(--fs-base);cursor:pointer;transition:.12s;display:flex;align-items:center;gap:12px;
  line-height:1.5;
}
.qc-opt:hover:not(:disabled){background:var(--primary-soft);border-color:var(--primary);}
.qc-opt.selected{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-dark);}
.qc-opt:disabled{cursor:default;opacity:.8;}
.qc-opt .opt-letter{
  flex:0 0 30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--fs-sm);
}
.qc-opt.selected .opt-letter{background:var(--primary-dark);}
.qc-shortcuts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.qc-shortcut{
  min-height:40px;padding:7px 14px;border-radius:999px;background:var(--bg);
  border:2px solid var(--line);color:var(--ink-soft);font-size:var(--fs-sm);font-weight:600;cursor:pointer;
}
.qc-shortcut:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.quiz-parse-warn{color:var(--warn);font-size:var(--fs-sm);font-weight:600;margin-top:8px;}

/* ==================== 自定义 chip 删除 × ==================== */
.chip.custom{position:relative;}
.chip-del-x{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.35);
  margin-left:6px;font-size:15px;line-height:1;font-weight:700;cursor:pointer;
  vertical-align:middle;
}
.chip-del-x:hover{background:rgba(255,255,255,.65);}
</style>
</head>

<script>
"use strict";
/* ============================================================
   中医学习助手 · 单文件应用
   模块顺序：CONFIG 常量区 / db 层 / api 层 / 模板数据区 / ui 层
   ============================================================ */

/* ==================== ① CONFIG 常量区 ====================
   模型字符串与单价（来源：ai.google.dev 官方文档，2026-06 核实）
   单价单位：美元 / 每百万 token（USD per 1M tokens，paid tier）
   - 深度模式(Pro)：gemini-3.1-pro-preview  输入 $2.00 / 输出 $12.00
   - 快速模式(Flash)：gemini-2.5-flash（稳定版）输入 $0.30 / 输出 $2.50
   说明：Pro 档用当前旗舰 3.1（与官方 Gemini 网页一致，保证"灵光"水准不降级）；
   Flash 档用 2.5 稳定线（最便宜，作省额度模式）。
   备选（如需可在设置页改模型字符串）：
     gemini-2.5-pro    输入 $1.25 / 输出 $10.00（旧旗舰，更省）
     gemini-3.5-flash  输入 $1.50 / 输出 $9.00（新 Flash，更强但贵）
   模型字符串允许在「设置」中修改，以防未来改名。
========================================================== */
const CONFIG = {
  models: {
    pro:   { id: "gemini-3.1-pro-preview", label: "深度模式（Pro）",  inPrice: 2.00, outPrice: 12.00 },
    flash: { id: "gemini-2.5-flash", label: "快速模式（Flash）", inPrice: 0.30, outPrice: 2.50  }
  },
  apiBase: "https://generativelanguage.googleapis.com/v1beta/models",
  defaultMonthlyLimit: 10,      // 默认月度限额 $10
  defaultFontSize: "大",         // 默认字号
  dbName: "tcm-assistant",
  dbVersion: 2,   // v2：新增 patients（患者医案）store
  generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
};

/* ==================== ② db 层（IndexedDB 封装） ====================
   库名 tcm-assistant，三个 object store：
     sessions（会话元数据） / messages（消息节点·树结构） / settings（键值）
   全部封装为 async API。
================================================================ */
const DB = (() => {
  let _db = null;
  function open() {
    return new Promise((resolve, reject) => {
      if (_db) return resolve(_db);
      const req = indexedDB.open(CONFIG.dbName, CONFIG.dbVersion);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("sessions")) {
          const s = db.createObjectStore("sessions", { keyPath: "id" });
          s.createIndex("updatedAt", "updatedAt");
        }
        if (!db.objectStoreNames.contains("messages")) {
          const m = db.createObjectStore("messages", { keyPath: "id" });
          m.createIndex("sessionId", "sessionId");
        }
        if (!db.objectStoreNames.contains("settings")) {
          db.createObjectStore("settings", { keyPath: "key" });
        }
        // v2 新增：患者医案。onupgradeneeded 只新建缺失的 store，已有 store/数据不动。
        if (!db.objectStoreNames.contains("patients")) {
          const p = db.createObjectStore("patients", { keyPath: "id" });
          p.createIndex("updatedAt", "updatedAt");
        }
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
  }
  function tx(store, mode) {
    return open().then(db => db.transaction(store, mode).objectStore(store));
  }
  function reqP(r){ return new Promise((res,rej)=>{ r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }

  return {
    // sessions
    async putSession(s){ return reqP((await tx("sessions","readwrite")).put(s)); },
    async getSession(id){ return reqP((await tx("sessions","readonly")).get(id)); },
    async allSessions(){
      const arr = await reqP((await tx("sessions","readonly")).getAll());
      return (arr||[]).sort((a,b)=> b.updatedAt - a.updatedAt);
    },
    async delSession(id){ return reqP((await tx("sessions","readwrite")).delete(id)); },
    // messages
    async putMessage(m){ return reqP((await tx("messages","readwrite")).put(m)); },
    async getMessage(id){ return reqP((await tx("messages","readonly")).get(id)); },
    async messagesBySession(sid){
      const store = await tx("messages","readonly");
      const idx = store.index("sessionId");
      const arr = await reqP(idx.getAll(sid));
      return arr || [];
    },
    async delMessagesBySession(sid){
      const list = await this.messagesBySession(sid);
      const store = await tx("messages","readwrite");
      for(const m of list) store.delete(m.id);
      return true;
    },
    // patients（患者医案）
    async putPatient(p){ return reqP((await tx("patients","readwrite")).put(p)); },
    async getPatient(id){ return reqP((await tx("patients","readonly")).get(id)); },
    async allPatients(){
      const arr = await reqP((await tx("patients","readonly")).getAll());
      return (arr||[]).sort((a,b)=> (b.updatedAt||0) - (a.updatedAt||0));
    },
    async delPatient(id){ return reqP((await tx("patients","readwrite")).delete(id)); },
    // settings
    async getSetting(key, def){
      const r = await reqP((await tx("settings","readonly")).get(key));
      return r ? r.value : def;
    },
    async setSetting(key, value){ return reqP((await tx("settings","readwrite")).put({key, value})); },
    async allSettings(){ return reqP((await tx("settings","readonly")).getAll()); },
    // 全量导出/导入（备份）
    async exportAll(){
      const allSettings = await this.allSettings();
      return {
        meta: { app:"tcm-assistant", version:CONFIG.dbVersion, exportedAt:Date.now() },
        sessions: await this.allSessions(),
        messages: await (async()=>{ return reqP((await tx("messages","readonly")).getAll()); })(),
        settings: allSettings,
        patients: await this.allPatients(),
        // customChips 已在 settings 里（key="customChips"），无需单独字段
        // 但为向后兼容，也单独导出方便查看
        customChips: (allSettings.find(s=>s.key==="customChips")||{}).value || {}
      };
    },
    async importAll(data){
      if(!data || !data.sessions) throw new Error("文件格式不正确");
      const db = await open();
      await new Promise((res,rej)=>{
        const t = db.transaction(["sessions","messages","settings","patients"],"readwrite");
        t.oncomplete=res; t.onerror=()=>rej(t.error);
        (data.sessions||[]).forEach(s=>t.objectStore("sessions").put(s));
        (data.messages||[]).forEach(m=>t.objectStore("messages").put(m));
        (data.settings||[]).forEach(st=>t.objectStore("settings").put(st));
        (data.patients||[]).forEach(p=>t.objectStore("patients").put(p));
        // 若导入数据里有独立的 customChips 字段（旧格式兼容），合并进 settings
        if(data.customChips && typeof data.customChips==="object"){
          t.objectStore("settings").put({ key:"customChips", value:data.customChips });
        }
      });
      return true;
    }
  };
})();

/* ==================== ④ api 层（Gemini 直连） ====================
   优先 streamGenerateContent（SSE 流式），失败降级到 generateContent。
   contents 数组由当前路径上的消息组装，systemInstruction 单独传。
   无 key 时进入演示模式，返回固定模拟回复。
================================================================ */
const API = (() => {
  // 把路径消息转为 Gemini contents 格式（仅 user/model 进入 contents）
  // 用户消息若带 images，则 parts = [inline_data 图片..., text]
  function buildContents(pathMsgs){
    return pathMsgs
      .filter(m => m.role === "user" || m.role === "model")
      .map(m => {
        const parts = [];
        if(m.role === "user" && Array.isArray(m.images)){
          m.images.forEach(img=>{ if(img && img.dataB64) parts.push({ inline_data:{ mime_type: img.mimeType||"image/jpeg", data: img.dataB64 } }); });
        }
        parts.push({ text: m.content });
        return { role: m.role === "user" ? "user" : "model", parts };
      });
  }

  // 演示模式模拟回复
  function demoReply(userText, hasImages){
    const imgNote = hasImages ? `（已收到你上传的图片，演示模式下不做真实识别）\n\n` : ``;
    return `（演示模式：这是模拟回复，填入 API key 后将连接真实模型）\n\n` + imgNote +
      `我已收到你的问题：「${(userText||"").slice(0,40)}${(userText||"").length>40?"…":""}」。\n\n` +
      `当前为**演示模式**，没有真正调用 Gemini。请到右下角「⚙️ 设置」里填入你的 API key（去 Google AI Studio 免费申请），保存后再发送消息，就能连接真实的经方派老师模型啦。\n\n` +
      `> 提示：模型、月度额度、字号都可以在设置里调整。`;
  }

  /**
   * 发送一次请求。
   * @param {Object} o {apiKey, modelId, systemText, contents, onDelta, onDone, onError}
   *   onDelta(textChunk)  流式增量
   *   onDone({text, usage})  完成，usage={promptTokenCount,candidatesTokenCount,totalTokenCount}
   *   onError(messageZh, canRetry)
   */
  // 自定义错误类型：区分网络层失败 / HTTP 错误 / 流式中断
  class ApiError extends Error {
    constructor(kind, opts){
      super((opts && opts.message) || kind);
      this.kind = kind;            // "network" | "http" | "aborted"
      this.status = opts && opts.status;       // HTTP 状态码
      this.apiMessage = opts && opts.apiMessage; // Google 返回的 error.message 原文
      this.modelId = opts && opts.modelId;
      this.partial = opts && opts.partial;     // 中断时已收到的文本
    }
  }

  // 判断某错误是否属于「配额/额度受限」类（用于触发 key 故障转移）
  function isQuotaError(err){
    if(!(err instanceof ApiError) || err.kind!=="http") return false;
    if(err.status===429) return true;
    const m=(err.apiMessage||"")+" "+(err.message||"");
    return /RESOURCE_EXHAUSTED|quota|exceeded|rate limit/i.test(m);
  }

  // 用单个 key 发一次请求（流式优先，失败降级非流式）。失败抛 ApiError。
  async function sendOnce(apiKey, modelId, body, o){
    try {
      await streamCall(modelId, apiKey, body, o);
    } catch(streamErr){
      // 流式中途断开（已收到部分文本）：不降级，直接上抛（保留已收文本）
      if(streamErr instanceof ApiError && streamErr.kind==="aborted") throw streamErr;
      // 配额类错误：直接上抛，交由上层做 key 故障转移（不降级非流式）
      if(isQuotaError(streamErr)) throw streamErr;
      // 其他网络/HTTP 错误：尝试降级非流式（可能拿到更清晰的 error JSON）
      try {
        await nonStreamCall(modelId, apiKey, body, o);
      } catch(err){
        throw normalizeError(err, modelId);
      }
    }
  }

  /**
   * 发送一次请求，支持多 key 故障转移。
   * o 额外字段：
   *   keys: [{label,key}]   多 key 列表（优先于单 apiKey）
   *   startIndex: number    从第几个 key 开始
   *   genConfig: object     generationConfig 覆盖（含温度）
   *   onKeySwitch(fromLabel, toLabel)  切换 key 时回调（插系统提示用）
   *   onUsedKey(index)      实际成功使用的 key 索引（用于按 key 记账）
   *   hasImages: bool       是否带图（演示模式提示用）
   */
  async function send(o){
    const { systemText, contents } = o;
    const keys = (Array.isArray(o.keys) && o.keys.length) ? o.keys
                 : (o.apiKey ? [{ label:"key 1", key:o.apiKey }] : []);

    // —— 演示模式（无任何 key）——
    if(!keys.length){
      const lastUser = [...contents].reverse().find(c=>c.role==="user");
      let txt = "";
      if(lastUser){ const tp=(lastUser.parts||[]).find(p=>p.text); txt = tp ? tp.text : ""; }
      const full = demoReply(txt, o.hasImages);
      let i = 0;
      const step = () => {
        if(i < full.length){
          const chunk = full.slice(i, i+3); i += 3;
          o.onDelta && o.onDelta(chunk);
          setTimeout(step, 12);
        } else {
          o.onDone && o.onDone({ text: full, usage: { promptTokenCount:0, candidatesTokenCount:0, totalTokenCount:0 }, demo:true });
        }
      };
      step();
      return;
    }

    const body = {
      contents,
      systemInstruction: { parts:[{ text: systemText }] },
      generationConfig: o.genConfig || CONFIG.generationConfig
    };

    const modelId = o.modelId;
    let idx = (typeof o.startIndex==="number" && o.startIndex>=0 && o.startIndex<keys.length) ? o.startIndex : 0;
    let triedCount = 0;
    let lastErr = null;
    const total = keys.length;

    while(triedCount < total){
      const cur = keys[idx];
      try {
        await sendOnce(cur.key, modelId, body, o);
        o.onUsedKey && o.onUsedKey(idx);
        return; // 成功（onDone 已在 sendOnce 内回调）
      } catch(err){
        lastErr = err;
        // 流式中断：保留已收文本，不切 key（属于网络抖动，重试更合理）
        if(err instanceof ApiError && err.kind==="aborted"){
          o.onError && o.onError(err, true); return;
        }
        // 配额类：切到下一个 key 重试
        if(isQuotaError(err) && total>1){
          const nextIdx = (idx+1)%total;
          triedCount++;
          if(triedCount>=total) break; // 已走完一轮
          const fromLabel = cur.label || ("key "+(idx+1));
          const toLabel = keys[nextIdx].label || ("key "+(nextIdx+1));
          o.onKeySwitch && o.onKeySwitch(fromLabel, toLabel, idx, nextIdx);
          idx = nextIdx;
          continue;
        }
        // 其他错误：直接报错，不再轮询
        o.onError && o.onError(normalizeError(err, modelId), true);
        return;
      }
    }
    // 全部 key 都额度受限
    o.onError && o.onError(normalizeError(lastErr, modelId), true);
  }

  // 把 fetch 抛出的原始异常包装成统一的 ApiError
  function wrapFetchFailure(rawErr, modelId){
    // fetch 真网络层失败抛 TypeError（Failed to fetch / NetworkError）
    if(rawErr instanceof ApiError) return rawErr;
    if(rawErr instanceof TypeError || /Failed to fetch|NetworkError|network/i.test(rawErr && rawErr.message || "")){
      return new ApiError("network", { modelId, message: rawErr && rawErr.message });
    }
    return new ApiError("network", { modelId, message: rawErr && rawErr.message });
  }

  function normalizeError(err, modelId){
    if(err instanceof ApiError) return err;
    return wrapFetchFailure(err, modelId);
  }

  // 解析 HTTP 非 200 响应，提取 Google 的 error.message
  async function readHttpError(resp, modelId){
    let apiMessage = "";
    try {
      const t = await resp.text();
      try { const j = JSON.parse(t); apiMessage = j?.error?.message || ""; }
      catch(_){ apiMessage = (t||"").slice(0,300); }
    } catch(_){ /* 读不到正文 */ }
    return new ApiError("http", { status: resp.status, apiMessage, modelId,
      message: "HTTP "+resp.status+(apiMessage?(" "+apiMessage):"") });
  }

  async function streamCall(modelId, apiKey, body, o){
    const url = `${CONFIG.apiBase}/${encodeURIComponent(modelId)}:streamGenerateContent?alt=sse&key=${encodeURIComponent(apiKey)}`;
    let resp;
    try {
      resp = await fetch(url, {
        method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body)
      });
    } catch(netErr){
      throw wrapFetchFailure(netErr, modelId);   // 真网络层失败
    }
    if(!resp.ok){
      throw await readHttpError(resp, modelId);
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buf = "", full = "", usage = null;
    try {
      while(true){
        const { done, value } = await reader.read();
        if(done) break;
        buf += decoder.decode(value, { stream:true });
        // SSE 按行解析，data: 开头
        let idx;
        while((idx = buf.indexOf("\n")) >= 0){
          const line = buf.slice(0, idx).trim();
          buf = buf.slice(idx+1);
          if(!line.startsWith("data:")) continue;
          const jsonStr = line.slice(5).trim();
          if(jsonStr === "[DONE]") continue;
          try {
            const data = JSON.parse(jsonStr);
            const parts = data?.candidates?.[0]?.content?.parts;
            if(parts){
              for(const p of parts){ if(p.text){ full += p.text; o.onDelta && o.onDelta(p.text); } }
            }
            if(data.usageMetadata) usage = data.usageMetadata;
          } catch(e){ /* 单行解析失败忽略，等待更多数据 */ }
        }
      }
    } catch(streamBreak){
      // 流已经开始（拿到了部分文本），但读取中途断开
      throw new ApiError("aborted", { modelId, partial: full, message: streamBreak && streamBreak.message });
    }
    o.onDone && o.onDone({ text: full, usage: usage || { promptTokenCount:0, candidatesTokenCount:0, totalTokenCount:0 } });
  }

  async function nonStreamCall(modelId, apiKey, body, o){
    const url = `${CONFIG.apiBase}/${encodeURIComponent(modelId)}:generateContent?key=${encodeURIComponent(apiKey)}`;
    let resp;
    try {
      resp = await fetch(url, {
        method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body)
      });
    } catch(netErr){
      throw wrapFetchFailure(netErr, modelId);
    }
    if(!resp.ok){
      throw await readHttpError(resp, modelId);
    }
    const data = await resp.json();
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const text = parts.map(p=>p.text||"").join("");
    o.onDelta && o.onDelta(text); // 一次性给出
    o.onDone && o.onDone({ text, usage: data.usageMetadata || { promptTokenCount:0, candidatesTokenCount:0, totalTokenCount:0 } });
  }

  // 把 ApiError 翻成给用户看的「主提示 + 原始小字」结构
  // 返回 {main:主提示, detail:原始 error.message（可空）, kind, partial}
  function explainError(err){
    if(!(err instanceof ApiError)){
      return { main:"出错了："+((err&&err.message)||"未知错误").slice(0,120)+"。请重试。", detail:"", kind:"unknown" };
    }
    if(err.kind==="network"){
      return { main:"网络连接失败：浏览器无法访问 generativelanguage.googleapis.com。请检查网络/代理后重试。",
               detail: err.message||"", kind:"network" };
    }
    if(err.kind==="aborted"){
      return { main:"回答中断：连接在传输过程中断开。已为你保留收到的部分内容，可点重试续接。",
               detail: err.message||"", kind:"aborted", partial: err.partial||"" };
    }
    // http
    const s = err.status||0;
    let main;
    if(s===400) main = "请求无效（400）：常见原因是 API key 格式错误，或模型名不存在。";
    else if(s===401||s===403) main = "API key 无效或无权限（"+s+"）：请到设置里检查 key 是否填对、是否已开通。";
    else if(s===404) main = "模型不存在（404）：当前模型名为「"+(err.modelId||"?")+"」，可在设置中修改。";
    else if(s===429) main = "请求过于频繁或额度受限（429）：请稍候再试，或切换到快速模式。";
    else if(s===500||s===503) main = "Google 服务端暂时故障（"+s+"）：请稍后重试。";
    else main = "服务返回错误（HTTP "+s+"）。请重试。";
    return { main, detail: err.apiMessage||"", kind:"http", status:s };
  }

  // 旧接口保留：返回纯文本（兼容个别仍用字符串的地方）
  function friendlyError(err){ return explainError(err).main; }

  // 测试连接：固定用快速模型（flash）测 key 与网络连通性，返回 {ok, info}
  // 说明：深度模式(3.1 Pro)是 thinking 模型，思考耗时长，用它测连接常假超时；
  //       测的本质是「网络 + key 是否通」，用最快的 flash 即可，超时放宽到 30 秒。
  async function testConnection(apiKey, flashModelId){
    if(!apiKey) return { ok:false, info:{ main:"尚未填写 API key（当前为演示模式）。请先填入 key 再测试。", detail:"", kind:"nokey" } };
    const modelId = flashModelId || CONFIG.models.flash.id;
    const url = `${CONFIG.apiBase}/${encodeURIComponent(modelId)}:generateContent?key=${encodeURIComponent(apiKey)}`;
    const body = { contents:[{ role:"user", parts:[{ text:"你好" }] }],
                   generationConfig:{ temperature:0, maxOutputTokens:64 } };
    let resp;
    // 30 秒超时：用 AbortController，超时后中断 fetch，避免永远卡在「测试中…」
    const ctrl = new AbortController();
    let timedOut = false;
    const timer = setTimeout(()=>{ timedOut = true; try{ ctrl.abort(); }catch(_){} }, 30000);
    try {
      resp = await fetch(url, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body), signal: ctrl.signal });
    } catch(netErr){
      if(timedOut){
        return { ok:false, info:{ main:"连接超时（30秒无响应）：通常是网络/代理无法到达 Google API。", detail:"", kind:"timeout" } };
      }
      return { ok:false, info: explainError(wrapFetchFailure(netErr, modelId)) };
    } finally {
      clearTimeout(timer);
    }
    if(!resp.ok){
      return { ok:false, info: explainError(await readHttpError(resp, modelId)) };
    }
    let data=null; try{ data = await resp.json(); }catch(_){}
    const txt = data?.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("") || "";
    return { ok:true, info:{ main:"连接成功！key 与网络均正常（用快速模型「"+modelId+"」测试）。", detail:"模型回应："+(txt.slice(0,40)||"(空)"), kind:"ok" } };
  }

  return { send, demoReply, explainError, friendlyError, testConnection };
})();

function setupGlobalErrorHandlers(){
  window.onerror = function(message, source, lineno, colno, error){
    try{ console.error("[全局错误]", message, source+":"+lineno+":"+colno, error && error.stack || error); }catch(_){}
    errorToast((message||"脚本错误")+( (lineno!=null)?("（第"+lineno+"行）"):"" ));
    return false; // 不阻止默认行为
  };
  window.onunhandledrejection = function(ev){
    const reason = ev && ev.reason;
    const msg = (reason && (reason.message || reason)) || "未处理的异步错误";
    try{ console.error("[未处理的Promise拒绝]", reason && reason.stack || reason); }catch(_){}
    errorToast(String(msg));
  };
}
function monthKey(d=new Date()){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function dayKey(d=new Date()){ return monthKey(d)+"-"+String(d.getDate()).padStart(2,"0"); }

// 时间显示：当天显示 HH:MM，跨天显示 月-日 HH:MM
function fmtTime(ts){
  const d = new Date(ts), now = new Date();
  const hm = String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  const sameDay = d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
  return sameDay ? hm : (d.getMonth()+1)+"月"+d.getDate()+"日 "+hm;
}
// 相对时间（会话列表）
function relTime(ts){
  const diff = Date.now()-ts, m=60000, h=3600000, day=86400000;
  if(diff<m) return "刚刚";
  if(diff<h) return Math.floor(diff/m)+"分钟前";
  if(diff<day) return Math.floor(diff/h)+"小时前";
  if(diff<day*7) return Math.floor(diff/day)+"天前";
  const d=new Date(ts); return (d.getMonth()+1)+"月"+d.getDate()+"日";
}

/* ---------- 轻量 Markdown 渲染（无外部库） ---------- */
function mdToHtml(md){
  md = md || "";
  // 先抽取代码块，避免内部被转义/处理
  const codeBlocks = [];
  md = md.replace(/```([\s\S]*?)```/g, (m,code)=>{
    codeBlocks.push(code.replace(/^\w*\n/,"")); return "@@CODEBLOCK"+(codeBlocks.length-1)+"@@";
  });
  md = esc(md);
  // 表格
  md = md.replace(/(^\|.*\|[ \t]*\n\|[ \t:\-|]+\|[ \t]*\n(?:\|.*\|[ \t]*\n?)*)/gm, (block)=>{
    const rows = block.trim().split("\n");
    const header = rows[0].split("|").slice(1,-1).map(s=>s.trim());
    const bodyRows = rows.slice(2).map(r=>r.split("|").slice(1,-1).map(s=>s.trim()));
    let h = "<table><thead><tr>"+header.map(c=>"<th>"+inline(c)+"</th>").join("")+"</tr></thead><tbody>";
    bodyRows.forEach(r=>{ h+="<tr>"+r.map(c=>"<td>"+inline(c)+"</td>").join("")+"</tr>"; });
    return h+"</tbody></table>";
  });
  // 标题
  md = md.replace(/^### (.*)$/gm,"<h3>$1</h3>").replace(/^## (.*)$/gm,"<h2>$1</h2>").replace(/^# (.*)$/gm,"<h1>$1</h1>");
  // 引用
  md = md.replace(/^(?:&gt; ?.*(?:\n|$))+/gm, (block)=>{
    const inner = block.replace(/^&gt; ?/gm,"").trim();
    return "<blockquote>"+inline(inner).replace(/\n/g,"<br>")+"</blockquote>\n";
  });
  // 列表
  md = md.replace(/(?:^(?:\d+\.) .*(?:\n|$))+/gm, (block)=>{
    const items = block.trim().split("\n").map(l=>l.replace(/^\d+\.\s+/,""));
    return "<ol>"+items.map(i=>"<li>"+inline(i)+"</li>").join("")+"</ol>\n";
  });
  md = md.replace(/(?:^[-*•] .*(?:\n|$))+/gm, (block)=>{
    const items = block.trim().split("\n").map(l=>l.replace(/^[-*•]\s+/,""));
    return "<ul>"+items.map(i=>"<li>"+inline(i)+"</li>").join("")+"</ul>\n";
  });
  // 在整块的块级元素前后补空行（只匹配独立成段的完整块，惰性匹配最外层），
  // 确保段落分割时它们独立成块，避免 <p> 把 <ul>/<pre>/<table> 包进去
  md = md.replace(/(<(ul|ol|blockquote|table|pre|h[1-6])[\s>][\s\S]*?<\/\2>)/g, "\n\n$1\n\n");
  // 段落：把剩余文本按空行分段；本身就是块级 HTML 的原样保留
  md = md.split(/\n{2,}/).map(chunk=>{
    const t = chunk.trim();
    if(t==="") return "";
    if(/^<(h[1-6]|ul|ol|blockquote|table|pre)[\s>]/.test(t)) return t;
    return "<p>"+inline(t).replace(/\n/g,"<br>")+"</p>";
  }).join("\n");
  // 还原代码块
  md = md.replace(/(?:<p>)?@@CODEBLOCK(\d+)@@(?:<\/p>)?/g, (m,i)=> "<pre><code>"+esc(codeBlocks[+i])+"</code></pre>");
  return md;
  function inline(s){
    return s
      .replace(/`([^`]+)`/g,"<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(?<![*])\*([^*\n]+)\*(?![*])/g,"<em>$1</em>");
  }
}

/* ==================== Quiz 解析与渲染 ====================
   quiz 消息状态：{msgId -> {qid -> chosenLetter}}   (内存，不落库)
   选题后更新此 map，重新渲染时据此恢复高亮。
================================================================ */
const quizAnswerState = {};  // msgId -> { qNum(1-based) -> "A"|"B"|... }

/* 把 AI 消息全文拆成「普通段 / quiz块」交替数组 */
function splitQuizBlocks(text){
  const FENCE_RE = /```quiz\n([\s\S]*?)```/g;
  const segments = [];
  let lastIdx = 0;
  let m;
  while((m = FENCE_RE.exec(text)) !== null){
    if(m.index > lastIdx) segments.push({ type:"text", raw: text.slice(lastIdx, m.index) });
    segments.push({ type:"quiz", raw: m[1] });
    lastIdx = m.index + m[0].length;
  }
  if(lastIdx < text.length) segments.push({ type:"text", raw: text.slice(lastIdx) });
  return segments;
}

/* JSON 修复链：尝试修正常见漂移后重新 parse */
function repairAndParseJSON(raw){
  // Step 1: 直接 parse
  try{ return JSON.parse(raw); }catch(_){}
  // Step 2: 修复常见问题
  let s = raw;
  // 中文引号 → ASCII 引号
  s = s.replace(/[""]/g, '"').replace(/['']/g, "'");
  // 单引号 → 双引号（只替换作为 JSON 字符串包裹符的单引号，保守地替换）
  s = s.replace(/'([^']*?)'/g, '"$1"');
  // 尾逗号：,] 或 ,}
  s = s.replace(/,\s*([}\]])/g, '$1');
  // 去行注释（//...）
  s = s.replace(/\/\/[^\n]*/g, '');
  try{ return JSON.parse(s); }catch(_){}
  // Step 3: 尝试补缺失的结束括号
  let attempt = s.trim();
  if(!attempt.endsWith('}')) attempt += '}';
  if(!attempt.endsWith(']}')) attempt = attempt.replace(/}$/, ']}');
  try{ return JSON.parse(attempt); }catch(_){}
  return null;
}

/* 在全文中兜底搜索裸 JSON（无围栏时） */
function findBareQuizJSON(text){
  const m = text.match(/(\{"questions"\s*:\s*\[[\s\S]*?\}\s*\][\s\S]*?\})/);
  if(!m) return null;
  return repairAndParseJSON(m[1]);
}

/* 字母列表（A/B/C/D…） */
const OPTION_LETTERS = ["A","B","C","D","E","F"];

/* strip 选项行首的 "A." / "B、" / "a)" 前缀 */
function stripOptPrefix(s){
  return (s||"").replace(/^[A-Da-d][.、)]\s*/,"").trim();
}

/* 把一道题 + 状态渲染为 DOM 元素 */
function buildQuizCard(q, msgId){
  const qNum = q.id || 1;
  const answers = quizAnswerState[msgId] || {};
  const chosenLetter = answers[qNum] || null;

  const card = document.createElement("div");
  card.className = "quiz-card";
  card.dataset.qnum = qNum;

  // 题头：题号 + 考点标签
  const header = document.createElement("div");
  header.className = "qc-header";
  header.innerHTML =
    '<span class="qc-num">第'+qNum+'题</span>'+
    (q.tag ? '<span class="qc-tag">'+esc(q.tag)+'</span>' : '');
  card.appendChild(header);

  // 题干
  const stem = document.createElement("div");
  stem.className = "qc-stem";
  stem.textContent = q.stem || "";
  card.appendChild(stem);

  // 选项按钮
  const opts = document.createElement("div");
  opts.className = "qc-options";
  const options = (q.options||[]).map(stripOptPrefix);
  const isAnswered = !!chosenLetter;
  options.forEach((optText, idx)=>{
    const letter = OPTION_LETTERS[idx] || String.fromCharCode(65+idx);
    const btn = document.createElement("button");
    btn.className = "qc-opt" + (chosenLetter===letter ? " selected" : "");
    btn.disabled = isAnswered;
    btn.innerHTML =
      '<span class="opt-letter">'+esc(letter)+'</span>'+
      '<span>'+esc(optText)+'</span>';
    btn.addEventListener("click", ()=>{
      if(!quizAnswerState[msgId]) quizAnswerState[msgId] = {};
      quizAnswerState[msgId][qNum] = letter;
      // 发送选答文本
      sendMessage("第"+qNum+"题我选 "+letter);
      // 禁用本题所有按钮并高亮
      opts.querySelectorAll(".qc-opt").forEach(b=>{
        b.disabled = true;
        if(b === btn) b.classList.add("selected");
      });
    });
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  // 快捷按钮
  const shortcuts = document.createElement("div");
  shortcuts.className = "qc-shortcuts";
  [
    { emoji:"💡", label:"给点提示", text:"第"+qNum+"题给点提示" },
    { emoji:"📖", label:"看原文",   text:"第"+qNum+"题看原文" },
    { emoji:"✅", label:"直接看答案", text:"第"+qNum+"题直接看答案" }
  ].forEach(sc=>{
    const b = document.createElement("button");
    b.className = "qc-shortcut";
    b.textContent = sc.emoji+" "+sc.label;
    b.addEventListener("click", ()=> sendMessage(sc.text));
    shortcuts.appendChild(b);
  });
  card.appendChild(shortcuts);

  return card;
}

/* 把 AI 消息内容渲染成含题卡的 DOM（返回 DocumentFragment） */
function renderAiContent(text, msgId){
  // 先看全文有无 ```quiz 块
  const segments = splitQuizBlocks(text);
  const hasQuiz = segments.some(s=>s.type==="quiz");

  // 若没有围栏块，尝试兜底搜索裸 JSON
  if(!hasQuiz){
    const bareData = findBareQuizJSON(text);
    if(bareData && Array.isArray(bareData.questions)){
      const frag = document.createDocumentFragment();
      const wrapper = document.createElement("div");
      wrapper.innerHTML = mdToHtml(text);
      frag.appendChild(wrapper);
      bareData.questions.forEach(q=> frag.appendChild(buildQuizCard(q, msgId)));
      return frag;
    }
    // 纯普通文本
    const frag = document.createDocumentFragment();
    const wrapper = document.createElement("div");
    wrapper.innerHTML = mdToHtml(text);
    frag.appendChild(wrapper);
    return frag;
  }

  // 有 quiz 围栏块，按段渲染
  const frag = document.createDocumentFragment();
  segments.forEach(seg=>{
    if(seg.type==="text"){
      const t = (seg.raw||"").trim();
      if(!t) return;
      const d = document.createElement("div");
      d.innerHTML = mdToHtml(seg.raw);
      frag.appendChild(d);
    } else {
      // quiz 块
      const data = repairAndParseJSON(seg.raw);
      if(data && Array.isArray(data.questions)){
        data.questions.forEach(q=> frag.appendChild(buildQuizCard(q, msgId)));
      } else {
        // 解析彻底失败：降级为代码块 + 警告
        const d = document.createElement("div");
        d.innerHTML = '<pre><code>'+esc(seg.raw)+'</code></pre>'+
          '<div class="quiz-parse-warn">⚠️ 本题格式异常，请直接文字作答</div>';
        frag.appendChild(d);
      }
    }
  });
  return frag;
}

/* ---------- 消息树 ---------- */
/* message 节点：{id, sessionId, parentId, childIds:[], role, content, timestamp, tokenUsage} */
function newMessageNode(sessionId, parentId, role, content, images){
  const node = { id:uid(), sessionId, parentId:parentId||null, childIds:[], role, content,
           timestamp:Date.now(), tokenUsage:null };
  if(Array.isArray(images) && images.length){
    // 只存 {mimeType, dataB64}，previewUrl 运行时由 dataB64 重建
    node.images = images.map(im=>({ mimeType:im.mimeType||"image/jpeg", dataB64:im.dataB64 }));
  }
  return node;
}
// 从根沿"最后一个子节点"走到叶，得到当前显示路径
function computePath(){
  // 选取路径：从 pathLeafId 回溯到根；若无则从首个根沿最新子链
  const msgs = State.messages;
  if(State.pathLeafId && msgs[State.pathLeafId]){
    const path = [];
    let cur = msgs[State.pathLeafId];
    while(cur){ path.unshift(cur); cur = cur.parentId ? msgs[cur.parentId] : null; }
    return path;
  }
  // 默认：从第一个根，沿最后 child
  const path = [];
  let cur = State.rootIds.length ? msgs[State.rootIds[State.rootIds.length-1]] : null;
  while(cur){ path.push(cur); cur = cur.childIds.length ? msgs[cur.childIds[cur.childIds.length-1]] : null; }
  if(path.length) State.pathLeafId = path[path.length-1].id;
  return path;
}
// 重建本地索引
function indexMessages(list){
  State.messages = {}; State.rootIds = [];
  list.forEach(m=>{ State.messages[m.id]=m; });
  list.forEach(m=>{ if(!m.parentId) State.rootIds.push(m.id); });
  // 按时间排序根与子
  State.rootIds.sort((a,b)=> State.messages[a].timestamp - State.messages[b].timestamp);
  list.forEach(m=> m.childIds.sort((a,b)=> (State.messages[a]?.timestamp||0)-(State.messages[b]?.timestamp||0)));
}

/* ---------- 会话管理 ---------- */
async function loadSettings(){
  // 多 key：keys=[{label, key}]；向后兼容旧的单 apiKey 字段
  let keys = await DB.getSetting("keys", null);
  const legacyKey = await DB.getSetting("apiKey", "");
  if(!Array.isArray(keys)){
    keys = (legacyKey && legacyKey.trim()) ? [{ label:"key 1", key:legacyKey.trim() }] : [];
    if(keys.length) await DB.setSetting("keys", keys); // 迁移落库
  }
  let activeKeyIndex = await DB.getSetting("activeKeyIndex", 0);
  if(typeof activeKeyIndex!=="number" || activeKeyIndex<0 || activeKeyIndex>=keys.length) activeKeyIndex = 0;

  // 温度：tempEnabled=false 表示不传 temperature（跟随模型默认）
  const temperature = await DB.getSetting("temperature", 0.7);
  const tempEnabled = await DB.getSetting("tempEnabled", false);

  // 模板/人设的用户自定义覆盖：{模板key 或 "__default__": "覆盖文本"}
  const tplOverrides = await DB.getSetting("tplOverrides", {});

  State.settings = {
    keys, activeKeyIndex,
    monthlyLimit:  await DB.getSetting("monthlyLimit", CONFIG.defaultMonthlyLimit),
    modelPro:      await DB.getSetting("modelPro", CONFIG.models.pro.id),
    modelFlash:    await DB.getSetting("modelFlash", CONFIG.models.flash.id),
    fontSize:      await DB.getSetting("fontSize", CONFIG.defaultFontSize),
    temperature, tempEnabled,
    tplOverrides:  (tplOverrides && typeof tplOverrides==="object") ? tplOverrides : {},
    usage:         await DB.getSetting("usage", {}),  // {月份:{keyIdx:{total, byDay:{日:{cost,in,out}}}}}
    quotaWarned:   await DB.getSetting("quotaWarned", {}) // {月份:{keyIdx:{w80,w100}}}
  };
  document.documentElement.setAttribute("data-fontsize", State.settings.fontSize);
}
function modelIdForTier(tier){
  return tier==="flash" ? State.settings.modelFlash : State.settings.modelPro;
}
// 当前激活 key 的字符串（无 key 时返回空 → 演示模式）
function activeKey(){
  const s=State.settings;
  if(!s.keys || !s.keys.length) return "";
  const k=s.keys[s.activeKeyIndex] || s.keys[0];
  return (k && k.key) || "";
}
// 组装本次请求的 generationConfig：勾选「默认」则不传 temperature
function buildGenConfig(){
  const cfg = { maxOutputTokens: CONFIG.generationConfig.maxOutputTokens };
  if(State.settings && State.settings.tempEnabled){
    cfg.temperature = State.settings.temperature;
  }
  return cfg;
}

async function refreshSessions(){
  State.sessions = await DB.allSessions();
  renderSessions();
}

async function createSession(opts){
  opts = opts || {};
  const s = { id:uid(), title:opts.title||"新对话", createdAt:Date.now(), updatedAt:Date.now(),
              templateKey:opts.templateKey||null,
              patientId:opts.patientId||null };   // 模板/患者关联 会话级
  await DB.putSession(s);
  await refreshSessions();
  await openSession(s.id);
  closeSidebarOnMobile();
  return s;
}

async function openSession(id){
  State.currentSessionId = id;
  State.pathLeafId = null;
  const list = await DB.messagesBySession(id);
  indexMessages(list);
  const sess = State.sessions.find(s=>s.id===id) || await DB.getSession(id);
  // 同步模板按钮高亮
  setActiveTemplate(sess ? sess.templateKey : null, false);
  $("#convTitle").textContent = sess ? sess.title : "中医学习助手";
  renderSessions();
  renderStream();
}

async function renameSession(id){
  const s = State.sessions.find(x=>x.id===id); if(!s) return;
  const name = await promptDialog("重命名对话", s.title);
  if(name===null) return;
  s.title = name.trim() || "未命名对话";
  await DB.putSession(s);
  await refreshSessions();
  if(id===State.currentSessionId) $("#convTitle").textContent = s.title;
}

async function deleteSession(id){
  const s = State.sessions.find(x=>x.id===id);
  const ok = await confirmDialog("删除对话", "确定要删除「"+(s?s.title:"该")+"」这个对话吗？删除后无法恢复。");
  if(!ok) return;
  await DB.delMessagesBySession(id);
  await DB.delSession(id);
  if(id===State.currentSessionId){ State.currentSessionId=null; State.messages={}; State.rootIds=[]; State.pathLeafId=null; }
  await refreshSessions();
  if(State.currentSessionId) await openSession(State.currentSessionId);
  else if(State.sessions.length) await openSession(State.sessions[0].id);
  else { $("#convTitle").textContent="中医学习助手"; renderStream(); }
}

/* ---------- 渲染：会话列表 ---------- */
function renderSessions(){
  const box = $("#sessList"); box.innerHTML="";
  if(!State.sessions.length){
    box.innerHTML = '<div style="padding:20px;color:var(--ink-soft);text-align:center;">还没有对话<br>点上面的「新建对话」开始吧</div>';
    return;
  }
  State.sessions.forEach(s=>{
    const div = document.createElement("div");
    div.className = "sess-item"+(s.id===State.currentSessionId?" active":"");
    div.innerHTML =
      '<div class="title">'+esc(s.title)+'</div>'+
      '<div class="meta"><span>'+relTime(s.updatedAt)+'</span>'+
      '<span class="sess-acts">'+
        '<button data-act="rename">重命名</button>'+
        '<button data-act="del">删除</button>'+
      '</span></div>';
    div.addEventListener("click",(e)=>{
      const act = e.target.getAttribute("data-act");
      if(act==="rename"){ e.stopPropagation(); renameSession(s.id); }
      else if(act==="del"){ e.stopPropagation(); deleteSession(s.id); }
      else { openSession(s.id); closeSidebarOnMobile(); }
    });
    box.appendChild(div);
  });
}

/* ---------- 渲染：消息流 ---------- */
function renderStream(){
  try{
    _renderStreamCore();
  }catch(err){
    try{ console.error("[renderStream 渲染失败]", err && err.stack || err); }catch(_){}
    errorToast("界面渲染出错："+((err&&err.message)||err));
    try{
      const stream=$("#stream");
      if(stream) stream.innerHTML='<div class="empty-state"><div class="big">⚠️</div>'+
        '<h3 class="serif">界面渲染出错</h3>'+
        '<p>请刷新页面。数据已保存，不会丢失。</p></div>';
    }catch(_){}
  }
}
function _renderStreamCore(){
  const stream = $("#stream");
  const path = computePath();
  if(!State.currentSessionId || path.length===0){
    stream.innerHTML = emptyStateHtml();
    bindEmptyState();
    updateQuickNav([]);
    return;
  }
  stream.innerHTML = "";
  // 患者关联横幅
  const curSess = State.sessions.find(s=>s.id===State.currentSessionId);
  if(curSess && curSess.patientId){
    const pat = State.patients.find(p=>p.id===curSess.patientId);
    if(pat){
      const banner=document.createElement("div"); banner.className="pat-banner";
      banner.textContent="📂 本对话关联患者："+pat.name+"（点击查看档案）";
      banner.addEventListener("click", ()=> openPatientDetail(pat.id));
      stream.appendChild(banner);
    }
  }
  let lastDayKey = null;
  path.forEach(m=>{
    const dk = dayKey(new Date(m.timestamp));
    if(dk !== lastDayKey){
      stream.appendChild(renderDateSep(m.timestamp));
      lastDayKey = dk;
    }
    stream.appendChild(renderMsgNode(m));
  });
  updateQuickNav(path);
  scrollBottom();
}

// 居中日期分隔条
function renderDateSep(ts){
  const d = new Date(ts);
  const div = document.createElement("div");
  div.className = "date-sep";
  div.innerHTML = '<span>'+d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"+'</span>';
  return div;
}
// 只取 HH:MM（气泡角落小字用）
function fmtHM(ts){
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function renderMsgNode(m){
  const wrap = document.createElement("div");
  wrap.className = "msg "+(m.role==="user"?"user":"ai");
  wrap.dataset.id = m.id;
  // CSS 几何头像内放一个小字：用户「我」、AI「师」
  const avatar = m.role==="user" ? "我" : "师";
  // 图片缩略图（仅 user 消息可能带）
  let imgsHtml = "";
  if(Array.isArray(m.images) && m.images.length){
    imgsHtml = '<div class="bubble-imgs">'+ m.images.map(im=>{
      const src = "data:"+(im.mimeType||"image/jpeg")+";base64,"+(im.dataB64||"");
      return '<img src="'+src+'" alt="图片" loading="lazy">';
    }).join("") +'</div>';
  }
  let acts = "";
  if(m.role==="user"){
    acts = '<div class="msg-acts"><button data-act="edit">✏️ 修改并重新提问</button></div>';
  }

  if(m.role==="ai" || m.role==="model"){
    // AI 消息：先渲染骨架，再把内容（含题卡）append 进 bubble
    wrap.innerHTML =
      '<div class="avatar">'+esc(avatar)+'</div>'+
      '<div class="body">'+
        '<div class="time">'+fmtHM(m.timestamp)+'</div>'+
        '<div class="bubble"></div>'+
      '</div>';
    const bubble = wrap.querySelector(".bubble");
    if(imgsHtml){ const d=document.createElement("div"); d.innerHTML=imgsHtml; bubble.appendChild(d); }
    if(m.content){
      const rendered = renderAiContent(m.content, m.id);
      bubble.appendChild(rendered);
    }
  } else {
    // 用户消息
    const textHtml = esc(m.content).replace(/\n/g,"<br>");
    const bodyHtml = imgsHtml + textHtml;
    wrap.innerHTML =
      '<div class="avatar">'+esc(avatar)+'</div>'+
      '<div class="body">'+
        '<div class="time">'+fmtHM(m.timestamp)+'</div>'+
        '<div class="bubble">'+bodyHtml+'</div>'+
        acts+
      '</div>';
    wrap.querySelector('[data-act="edit"]').addEventListener("click", ()=> startEdit(m.id));
  }
  // 图片点击放大
  wrap.querySelectorAll(".bubble-imgs img").forEach(im=>{
    im.addEventListener("click", ()=> openLightbox(im.src));
  });
  return wrap;
}

/* ---------- 模板（会话级 systemInstruction） ---------- */
async function setActiveTemplate(key, persist){
  const sess = State.currentSessionId ? (State.sessions.find(s=>s.id===State.currentSessionId)||await DB.getSession(State.currentSessionId)) : null;
  if(persist && sess){ sess.templateKey = key; await DB.putSession(sess); await refreshSessions(); }
  // 高亮按钮（含「更多」弹层里的；无模板时高亮「自由对话」）
  $$("#tplBar .tpl-btn, #tplMorePop .tpl-btn").forEach(b=>{
    if(b.dataset.key==="__free__") b.classList.toggle("on", !key);
    else b.classList.toggle("on", b.dataset.key===key);
  });
  // 选了折叠区的模板时，让「更多」按钮也带高亮提示
  const moreBtn=$("#tplMoreBtn");
  if(moreBtn) moreBtn.classList.toggle("on", TPL_MORE.indexOf(key)>=0);
  // 标签 + 占位
  const tpl = TEMPLATES.find(t=>t.key===key);
  const tag = $("#activeTplTag");
  if(tpl){
    tag.style.display="flex";
    tag.innerHTML = "已选模板："+tpl.icon+tpl.name+' <span class="x" title="取消模板">✕ 取消</span>';
    tag.querySelector(".x").onclick = ()=> setActiveTemplate(null, true);
    $("#inputBox").placeholder = tpl.placeholder;
  } else {
    tag.style.display="none";
    $("#inputBox").placeholder = "在这里输入您的问题…（按发送键提交）";
  }
}
// 取某模板（或自由对话 __default__）的生效 system 文本：优先用户自定义覆盖
function effectiveSystemFor(templateKey){
  const ov = State.settings && State.settings.tplOverrides || {};
  if(templateKey){
    if(ov[templateKey] && ov[templateKey].trim()) return ov[templateKey];
    const tpl = TEMPLATES.find(t=>t.key===templateKey);
    return tpl ? tpl.system : DEFAULT_SYSTEM;
  }
  // 自由对话
  if(ov["__default__"] && ov["__default__"].trim()) return ov["__default__"];
  return DEFAULT_SYSTEM;
}
function currentSystemText(){
  const sess = State.sessions.find(s=>s.id===State.currentSessionId);
  const tplKey = sess && sess.templateKey ? sess.templateKey : null;
  const base = effectiveSystemFor(tplKey);
  let out = base + dateAwarenessSuffix();
  // 关联患者时，附加患者医案档案
  if(sess && sess.patientId){
    const pat = State.patients.find(p=>p.id===sess.patientId);
    if(pat) out += buildPatientArchiveText(pat);
  }
  return out;
}

// 组装注入用的患者档案文本；超长（>8000）只取基本信息 + 最近 5 次就诊
function buildPatientArchiveText(pat){
  const basic = patientBasicText(pat);
  const visits = (pat.visits||[]).slice().sort((a,b)=> (a.date||"").localeCompare(b.date||"") || (a.createdAt||0)-(b.createdAt||0));
  function assemble(vList){
    let t = "\n\n【患者医案档案】\n"+basic;
    if(vList.length){
      t += "\n\n既往就诊摘要（按时间顺序）：";
      vList.forEach((v,i)=>{ t += "\n\n— 第"+(i+1)+"次 · "+(v.date||"日期未记录")+" —\n"+(v.summary||"（无摘要）"); });
    } else { t += "\n\n（暂无既往就诊记录）"; }
    t += "\n\n以上为该患者既往医案，请在本次复诊中以此为准把握病情演变，不要遗忘或编造既往信息。";
    return t;
  }
  let full = assemble(visits);
  if(full.length > 8000){
    full = assemble(visits.slice(-5));
  }
  return full;
}
function patientBasicText(pat){
  const age = pat.birthYear ? ((new Date().getFullYear()-pat.birthYear)+"岁（"+pat.birthYear+"年生）") : (pat.ageText||"未记录");
  return "称呼："+(pat.name||"未记录")+
    "\n性别："+(pat.gender||"未记录")+
    "\n年龄："+age+
    "\n体质/基础情况："+(pat.constitution||"未记录")+
    "\n禁忌/慎用："+(pat.taboos||"未记录");
}

// 日期感知：给 systemInstruction 追加「今天是…」与时间标注说明
function dateAwarenessSuffix(){
  const d = new Date();
  const week = ["日","一","二","三","四","五","六"][d.getDay()];
  const ds = d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  return "\n【系统信息】今天是 "+ds+"，星期"+week+"。对话中各消息前的【时间】标注由系统自动添加，是该消息的真实发送时间，请以此为准记录和推算病程日期，不要凭感觉猜测日期。";
}

// 给发往 API 的用户消息文本加时间前缀（不影响界面显示与存储）。AI 消息不加。
function apiPrefixForUser(ts){
  const d = new Date(ts);
  const p = (n)=> String(n).padStart(2,"0");
  return "【"+d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes())+"】\n";
}
// 由路径消息组装 contents，并给 user 消息加时间前缀
function buildApiContents(pathMsgs){
  return pathMsgs.filter(m=>m.role==="user"||m.role==="model").map(m=>{
    const text = m.role==="user" ? (apiPrefixForUser(m.timestamp)+m.content) : m.content;
    return { role: m.role==="user"?"user":"model", parts:[{text}] };
  });
}
// v3：高频模板 + 折叠模板分组
const TPL_HFREQ = ["wenzhen","fangji","zhenjiu","yiyi"];
const TPL_MORE  = ["tiaowen","jianbie","ceyan","yian"];

function makeTplBtn(t){
  const b = document.createElement("button");
  b.className="tpl-btn"; b.dataset.key=t.key; b.textContent = t.icon+" "+t.name;
  b.addEventListener("click", ()=>{ closeTplMore(); openTemplateCard(t.key); });

function renderTemplateBar(){
  const bar = $("#tplBar"); bar.innerHTML="";

  const free=document.createElement("button");
  free.className="tpl-btn free"; free.dataset.key="__free__"; free.textContent="💬 自由对话";
  free.addEventListener("click", async ()=>{
    if(!State.currentSessionId) await createSession();
    await setActiveTemplate(null, true);
  });
  bar.appendChild(free);
  // 高频
  TPL_HFREQ.forEach(k=>{ const t=TEMPLATES.find(x=>x.key===k); if(t) bar.appendChild(makeTplBtn(t)); });
  // 更多 ▾
  const moreWrap=document.createElement("div"); moreWrap.className="tpl-more-wrap";
  const moreBtn=document.createElement("button"); moreBtn.className="tpl-btn"; moreBtn.id="tplMoreBtn"; moreBtn.textContent="更多 ▾";
  const pop=document.createElement("div"); pop.className="tpl-more-pop"; pop.id="tplMorePop";
  TPL_MORE.forEach(k=>{ const t=TEMPLATES.find(x=>x.key===k); if(t) pop.appendChild(makeTplBtn(t)); });
  moreBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    if(pop.classList.contains("show")){ pop.classList.remove("show"); return; }
    pop.classList.add("show");

  });
