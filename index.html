  bar.appendChild(moreWrap);
}
// 弹层用 fixed 定位，按钮上方弹出、右对齐按钮；超出视口则贴边
function positionTplMore(btn, pop){
  const r = btn.getBoundingClientRect();
  // 先显示以测量尺寸
  pop.style.left="0px"; pop.style.top="0px";
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = r.right - pw;            // 右对齐按钮右缘
  if(left < 8) left = 8;
  if(left + pw > window.innerWidth-8) left = window.innerWidth-8-pw;
  let top = r.top - ph - 8;           // 弹在按钮上方
  if(top < 8) top = r.bottom + 8;     // 上方放不下则弹到下方
  pop.style.left = left+"px";
  pop.style.top = top+"px";
}
function closeTplMore(){ const p=$("#tplMorePop"); if(p) p.classList.remove("show"); }

/* 模板说明卡：点击任何模板先弹说明，确认后才激活 */
function openTemplateCard(key){
  const t = TEMPLATES.find(x=>x.key===key); if(!t) return;
  const sess = State.currentSessionId ? State.sessions.find(s=>s.id===State.currentSessionId) : null;
  const isActive = sess && sess.templateKey===key;
  $("#tplCardTitle").textContent = t.icon+" "+t.name;
  const body=$("#tplCardBody");
  let egHtml = (t.examples||[]).map((eg,i)=>'<button class="tpl-eg" data-eg="'+i+'">'+esc(eg)+'</button>').join("");
  const ov=State.settings.tplOverrides||{};
  const customized = !!(ov[key] && ov[key].trim());
  const effective = effectiveSystemFor(key);
  body.innerHTML =
    '<div class="tpl-card-brief">'+esc(t.brief||"")+(customized?'<span class="tpl-custom-badge">已自定义</span>':'')+'</div>'+
    '<div class="tpl-card-sub">示例问题（点一下直接填入并使用）</div>'+
    egHtml+
    '<details class="tpl-card-full"><summary>查看完整指令</summary>'+
      '<div style="display:flex;gap:10px;margin:8px 0;flex-wrap:wrap;">'+
        '<button class="btn ghost small" id="tplCardEdit">✏️ 编辑</button>'+
        (customized?'<button class="btn ghost small" id="tplCardReset">↩ 恢复默认</button>':'')+
      '</div>'+
      '<pre>'+esc(effective)+'</pre></details>';
  // 编辑 / 恢复默认
  const editBtn=$("#tplCardEdit");
  if(editBtn) editBtn.addEventListener("click", ()=>{
    $("#tplCardOverlay").classList.remove("show");
    openTplEditor(key, t.name);
  });
  const resetBtn=$("#tplCardReset");
  if(resetBtn) resetBtn.addEventListener("click", async ()=>{
    const ok=await confirmDialog("恢复默认","确定把「"+t.name+"」恢复成默认指令吗？");
    if(!ok) return;
    delete State.settings.tplOverrides[key];
    await DB.setSetting("tplOverrides", State.settings.tplOverrides);
    openTemplateCard(key); // 重渲染卡片
    toast("已恢复默认");
  });
  // 示例点击 = 填入输入框 + 激活模板 + 关卡
  $$("#tplCardBody .tpl-eg").forEach(b=>{
    b.addEventListener("click", async ()=>{
      const i=+b.dataset.eg; const eg=(t.examples||[])[i]||"";
      if(!State.currentSessionId) await createSession();
      await setActiveTemplate(key, true);
      const box=$("#inputBox"); box.value=eg; autoGrow(box);
      $("#tplCardOverlay").classList.remove("show");
      box.focus();
    });
  });
  // 主按钮：已激活则变「取消此模式」
  const useBtn=$("#tplCardUse");
  if(isActive){
    useBtn.textContent="取消此模式"; useBtn.classList.add("danger");
    useBtn.onclick = async ()=>{ await setActiveTemplate(null, true); $("#tplCardOverlay").classList.remove("show"); };
  } else {
    useBtn.textContent="使用此模式"; useBtn.classList.remove("danger");
    useBtn.onclick = async ()=>{
      if(!State.currentSessionId) await createSession();
      await setActiveTemplate(key, true); $("#tplCardOverlay").classList.remove("show"); $("#inputBox").focus();
    };
  }
  $("#tplCardOverlay").classList.add("show");
}

/* ---------- 图片上传（多模态） ---------- */
// 待发送图片暂存：[{mimeType, dataB64, previewUrl}]
const pendingImages = [];

// 压缩图片：最长边 ≤1280，JPEG quality 0.85，返回 {mimeType, dataB64}
function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("读取图片失败"));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("图片解码失败"));
      img.onload=()=>{
        const MAX=1280;
        let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(w>h && w>MAX){ h=Math.round(h*MAX/w); w=MAX; }
        else if(h>=w && h>MAX){ w=Math.round(w*MAX/h); h=MAX; }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        const ctx=cv.getContext("2d");
        ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); // 透明底转白，避免 JPEG 变黑
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=cv.toDataURL("image/jpeg",0.85);
        const dataB64=dataUrl.split(",")[1]||"";
        resolve({ mimeType:"image/jpeg", dataB64, previewUrl:dataUrl });
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleImageFiles(fileList){
  const files=Array.from(fileList||[]).filter(f=>f && f.type && f.type.startsWith("image/"));
  if(!files.length) return;
  for(const f of files){
    if(pendingImages.length>=6){ toast("一次最多带 6 张图片"); break; }
    try{
      const img=await compressImage(f);
      pendingImages.push(img);
    }catch(e){ toast("有一张图片处理失败，已跳过"); }
  }
  renderImgStaging();
}

function renderImgStaging(){
  const box=$("#imgStaging"); if(!box) return;
  if(!pendingImages.length){ box.style.display="none"; box.innerHTML=""; return; }
  box.style.display="flex"; box.innerHTML="";
  pendingImages.forEach((img,i)=>{
    const t=document.createElement("div"); t.className="img-thumb";
    t.innerHTML='<img src="'+img.previewUrl+'" alt="待发图片"><span class="rm" title="移除">×</span>';
    t.querySelector(".rm").addEventListener("click",()=>{ pendingImages.splice(i,1); renderImgStaging(); });
    t.querySelector("img").addEventListener("click",()=> openLightbox(img.previewUrl));
    box.appendChild(t);
  });
}
function clearPendingImages(){ pendingImages.length=0; renderImgStaging(); }

// lightbox 放大
function openLightbox(src){
  const lb=$("#lightbox"), im=$("#lightboxImg");
  if(!lb||!im) return;
  im.src=src; lb.classList.add("show");
}

/* ---------- 发送 / 接收（含树 fork） ---------- */
async function sendMessage(text, opts){
  opts = opts || {};
  if(State.streaming) return;
  text = (text||"").trim();
  if(!text) return;
  if(!State.currentSessionId) await createSession();

  // 父节点：当前路径叶（或 opts.parentId 用于 edit fork）
  const path = computePath();
  let parentId = opts.parentId !== undefined ? opts.parentId : (path.length ? path[path.length-1].id : null);

  // 创建 user 节点，挂到父（带本次待发图片）
  const imgs = pendingImages.slice();
  const userNode = newMessageNode(State.currentSessionId, parentId, "user", text, imgs);
  clearPendingImages();
  attachChild(parentId, userNode);
  await DB.putMessage(userNode);
  if(parentId && State.messages[parentId]) await DB.putMessage(State.messages[parentId]);
  State.pathLeafId = userNode.id;

  // 若会话仍是默认标题，用首问题前 18 字命名
  const sess = State.sessions.find(s=>s.id===State.currentSessionId);
  if(sess && (sess.title==="新对话" || !sess.title)){
    sess.title = text.slice(0,18) || "新对话";
    $("#convTitle").textContent = sess.title;
  }
  if(sess){ sess.updatedAt=Date.now(); await DB.putSession(sess); }
  await refreshSessions();
  renderStream();

  // 创建占位的 model 节点
  const aiNode = newMessageNode(State.currentSessionId, userNode.id, "model", "");
  attachChild(userNode.id, aiNode);
  State.pathLeafId = aiNode.id;
  renderStream();
  const aiEl = $('#stream .msg[data-id="'+aiNode.id+'"] .bubble');
  if(aiEl) aiEl.innerHTML = '<span class="typing-cursor"></span>';

  // 组装 contents：当前路径（到 userNode）的 user/model 消息（user 加时间前缀）
  const contents = buildApiContents(pathFromRootTo(userNode.id));

  State.streaming = true; setSending(true);
  let acc = "", usedKeyIdx = State.settings.activeKeyIndex;
  const hasImages = !!(userNode.images && userNode.images.length);
  API.send({
    keys: State.settings.keys,
    startIndex: State.settings.activeKeyIndex,
    modelId: modelIdForTier(State.tier),
    systemText: currentSystemText(),
    genConfig: buildGenConfig(),
    hasImages,
    contents,
    onKeySwitch: (fromLabel, toLabel)=> insertKeySwitchTip(aiEl, fromLabel, toLabel),
    onUsedKey: async (idx)=>{ usedKeyIdx = idx; await persistActiveKey(idx); },
    onDelta: (chunk)=>{
      acc += chunk;
      if(aiEl) aiEl.innerHTML = mdToHtml(acc)+'<span class="typing-cursor"></span>';
      scrollBottom();
    },
    onDone: async ({text, usage, demo})=>{
      aiNode.content = text || acc;
      aiNode.tokenUsage = usage || null;
      await DB.putMessage(aiNode);
      if(aiEl) aiEl.innerHTML = mdToHtml(aiNode.content);
      State.streaming=false; setSending(false);
      // 额度累计（演示模式不计），按实际使用的 key 记账
      if(!demo && usage) await accrueUsage(usage, usedKeyIdx);
      renderStream();
    },
    onError: async (err)=>{
      State.streaming=false; setSending(false);
      const info = API.explainError(err);
      renderErrorInBubble(aiEl, info, acc, async ()=>{
        // 删除失败的 ai 占位节点后重发同一 user（不留空气泡）
        detachChild(userNode.id, aiNode.id);
        delete State.messages[aiNode.id];
        State.pathLeafId = userNode.id;
        await resendFrom(userNode.id);
      });
      toast(info.main, 4000);
    }
  });
}

// 切换 key 时持久化激活索引（下次默认从这个 key 开始）
async function persistActiveKey(idx){
  if(idx===State.settings.activeKeyIndex) return;
  State.settings.activeKeyIndex = idx;
  await DB.setSetting("activeKeyIndex", idx);
  renderQuota();
}
// 在 AI 气泡前插入一条「已切换到 key X」系统小提示
function insertKeySwitchTip(aiEl, fromLabel, toLabel){
  try{
    const msgWrap = aiEl ? aiEl.closest(".msg") : null;
    const tip=document.createElement("div"); tip.className="sys-tip";
    tip.innerHTML='<span>已切换到 '+esc(toLabel)+'（'+esc(fromLabel)+' 额度受限）</span>';
    if(msgWrap && msgWrap.parentNode){ msgWrap.parentNode.insertBefore(tip, msgWrap); }
    else { const st=$("#stream"); if(st) st.appendChild(tip); }
    scrollBottom();
  }catch(_){}
}

// 在 AI 气泡里渲染错误（主提示 + 原始小字 + 重试按钮）。
// 若是流式中断且有已收文本（partial 或 accText），先保留正文，再在尾部加中断标记。
function renderErrorInBubble(aiEl, info, accText, onRetry){
  if(!aiEl) return;
  let html = "";
  const partial = (info.kind==="aborted") ? (info.partial || accText || "") : "";
  if(partial){
    html += mdToHtml(partial);
    html += '<div style="color:var(--warn);font-weight:600;margin-top:8px;">⚠️ 回答中断</div>';
  } else {
    html += '<div style="color:var(--danger);font-weight:600;">⚠️ '+esc(info.main)+'</div>';
  }
  if(info.detail){
    html += '<div style="color:var(--ink-soft);font-size:var(--fs-sm);margin-top:6px;word-break:break-all;">详情：'+esc(info.detail)+'</div>';
  }
  html += '<div class="msg-acts"><button data-retry>🔄 重试</button></div>';
  aiEl.innerHTML = html;
  const rb = aiEl.querySelector("[data-retry]");
  if(rb) rb.addEventListener("click", onRetry);
}

// 把当前 user 节点重新发起一次 AI 回复（重试用）
async function resendFrom(userNodeId){
  const userNode = State.messages[userNodeId]; if(!userNode) return;
  const aiNode = newMessageNode(State.currentSessionId, userNode.id, "model", "");
  attachChild(userNode.id, aiNode);
  State.pathLeafId = aiNode.id;
  renderStream();
  const aiEl = $('#stream .msg[data-id="'+aiNode.id+'"] .bubble');
  if(aiEl) aiEl.innerHTML='<span class="typing-cursor"></span>';
  const contents = buildApiContents(pathFromRootTo(userNode.id));
  State.streaming=true; setSending(true);
  let acc="", usedKeyIdx=State.settings.activeKeyIndex;
  const hasImages = !!(userNode.images && userNode.images.length);
  API.send({
    keys:State.settings.keys, startIndex:State.settings.activeKeyIndex,
    modelId:modelIdForTier(State.tier), systemText:currentSystemText(), genConfig:buildGenConfig(), hasImages, contents,
    onKeySwitch:(fromLabel,toLabel)=> insertKeySwitchTip(aiEl, fromLabel, toLabel),
    onUsedKey: async (idx)=>{ usedKeyIdx=idx; await persistActiveKey(idx); },
    onDelta:(c)=>{ acc+=c; if(aiEl) aiEl.innerHTML=mdToHtml(acc)+'<span class="typing-cursor"></span>'; scrollBottom(); },
    onDone: async ({text,usage,demo})=>{ aiNode.content=text||acc; aiNode.tokenUsage=usage||null; await DB.putMessage(aiNode);
      if(aiEl) aiEl.innerHTML=mdToHtml(aiNode.content); State.streaming=false; setSending(false);
      if(!demo&&usage) await accrueUsage(usage, usedKeyIdx); renderStream(); },
    onError: async (err)=>{ State.streaming=false; setSending(false);
      const info=API.explainError(err);
      renderErrorInBubble(aiEl, info, acc, async ()=>{
        detachChild(userNode.id, aiNode.id);
        delete State.messages[aiNode.id];
        State.pathLeafId = userNode.id;
        await resendFrom(userNode.id);
      });
      toast(info.main,4000); }
  });
}

// 编辑用户消息：在其【父节点】上 fork 一个新 user 子节点（树结构）
async function startEdit(userMsgId){
  const m = State.messages[userMsgId]; if(!m) return;
  const box = $("#inputBox");
  box.value = m.content;
  // 把原图片载回待发区（重建 previewUrl）
  clearPendingImages();
  if(Array.isArray(m.images)){
    m.images.forEach(im=>{ if(im && im.dataB64) pendingImages.push({ mimeType:im.mimeType||"image/jpeg", dataB64:im.dataB64, previewUrl:"data:"+(im.mimeType||"image/jpeg")+";base64,"+im.dataB64 }); });
    renderImgStaging();
  }
  box.focus();
  autoGrow(box);
  // 标记：本次发送将 fork 到该消息的父节点
  box.dataset.editParent = (m.parentId===null ? "ROOT" : m.parentId);
  toast("已载入这条提问，修改后点发送，将作为新的提问重新作答");
}

/* 树辅助 */
function attachChild(parentId, node){
  State.messages[node.id]=node;
  if(parentId && State.messages[parentId]){
    if(!State.messages[parentId].childIds.includes(node.id)) State.messages[parentId].childIds.push(node.id);
  } else {
    if(!State.rootIds.includes(node.id)) State.rootIds.push(node.id);
  }
}
function detachChild(parentId, childId){
  if(parentId && State.messages[parentId]){
    State.messages[parentId].childIds = State.messages[parentId].childIds.filter(x=>x!==childId);
  } else {
    State.rootIds = State.rootIds.filter(x=>x!==childId);
  }
}
function pathFromRootTo(id){
  const path=[]; let cur=State.messages[id];
  while(cur){ path.unshift(cur); cur=cur.parentId?State.messages[cur.parentId]:null; }
  return path;
}

/* ---------- 额度估算（按 月 + key 索引 分别累计） ----------
   usage 结构：{月份:{keyIdx:{total, byDay:{日:{cost,in,out}}}}}
   keyIdx 为字符串化的 key 索引；无 key（演示）时不记账。 */
function usageForKey(mk, keyIdx){
  const u=State.settings.usage;
  if(!u[mk]) u[mk]={};
  const k=String(keyIdx);
  if(!u[mk][k]) u[mk][k]={ total:0, byDay:{} };
  return u[mk][k];
}
// keyIdx：本次实际使用的 key 索引（故障转移后可能不是 activeKeyIndex）
async function accrueUsage(usage, keyIdx){
  if(keyIdx===undefined || keyIdx===null) keyIdx = State.settings.activeKeyIndex;
  const inTok = usage.promptTokenCount||0, outTok = usage.candidatesTokenCount||0;
  const model = State.tier==="flash" ? CONFIG.models.flash : CONFIG.models.pro;
  const cost = inTok/1e6*model.inPrice + outTok/1e6*model.outPrice;
  const mk = monthKey(), dk = dayKey();
  const ku = usageForKey(mk, keyIdx);
  if(!ku.byDay[dk]) ku.byDay[dk] = { cost:0, in:0, out:0 };
  ku.total += cost;
  ku.byDay[dk].cost += cost;
  ku.byDay[dk].in += inTok;
  ku.byDay[dk].out += outTok;
  await DB.setSetting("usage", State.settings.usage);
  await checkQuotaAlerts(keyIdx);
  renderQuota();
}
// 取某 key 本月已用金额
function keyMonthUsed(keyIdx, mk){
  mk = mk || monthKey();
  const u=State.settings.usage[mk];
  if(!u) return 0;
  const k=u[String(keyIdx)];
  return k ? (k.total||0) : 0;
}

async function checkQuotaAlerts(keyIdx){
  if(keyIdx===undefined) keyIdx=State.settings.activeKeyIndex;
  const mk=monthKey(), limit=State.settings.monthlyLimit||CONFIG.defaultMonthlyLimit;
  const used = keyMonthUsed(keyIdx, mk);
  if(!State.settings.quotaWarned[mk]) State.settings.quotaWarned[mk]={};
  const k=String(keyIdx);
  const warned = State.settings.quotaWarned[mk][k] || {};
  const label = (State.settings.keys[keyIdx] && State.settings.keys[keyIdx].label) || ("key "+(keyIdx+1));
  const pct = limit>0 ? used/limit : 0;
  if(pct>=1 && !warned.w100){
    warned.w100=true; State.settings.quotaWarned[mk][k]=warned; await DB.setSetting("quotaWarned", State.settings.quotaWarned);
    await alertDialog("「"+label+"」本月额度已用完", "「"+label+"」本月已用 $"+used.toFixed(2)+"，达到单 key 限额 $"+limit+"。\n若有下一个 key，发送时会自动切换；也可切到「快速模式」省额度，或到设置里调高限额。");
  } else if(pct>=0.8 && !warned.w80){
    warned.w80=true; State.settings.quotaWarned[mk][k]=warned; await DB.setSetting("quotaWarned", State.settings.quotaWarned);
    toast("提醒：「"+label+"」本月额度快到了（已用 "+Math.round(pct*100)+"%）", 4000);
  }
}

function renderQuota(){
  const mk=monthKey(), limit=State.settings.monthlyLimit||CONFIG.defaultMonthlyLimit;
  const ki=State.settings.activeKeyIndex;
  const hasKeys = State.settings.keys && State.settings.keys.length;
  const used=hasKeys ? keyMonthUsed(ki, mk) : 0;
  const pct=limit>0?Math.min(used/limit,1):0;
  const label = hasKeys ? ((State.settings.keys[ki] && State.settings.keys[ki].label) || ("key "+(ki+1))) : "演示模式";
  const lbl=$("#quotaLabel"); if(lbl) lbl.textContent = hasKeys ? ("本月用量 · "+label) : "本月用量";
  $("#quotaAmt").textContent = "$"+used.toFixed(2)+" / $"+limit;
  const fill=$("#quotaFill");
  fill.style.width=(pct*100).toFixed(1)+"%";
  fill.className="quota-fill"+(pct>=1?" over":pct>=0.8?" warn":"");
}

/* ---------- 问诊单自定义 chip 持久化 ----------
   customChips 存在 DB settings key "customChips"。
   结构：{ groupKey: [{text, count, lastUsed}] }
   groupKey 与 INQUIRY_SCHEMA 的 id 对应；脉象整体用 "pulseOverall"；
   各脉位用 "pulse_" + posId。
   最多 10 条显示（按 count 降序 → lastUsed 降序），容量上限 20。
   ---------------------------------------------------------------- */
let _customChipsCache = {};   // 运行时缓存，init 时从 DB 加载

async function loadCustomChips(){
  _customChipsCache = (await DB.getSetting("customChips", {})) || {};
}
async function saveCustomChips(){
  await DB.setSetting("customChips", _customChipsCache);
}

/** 向某组追加或更新一个自定义 chip */
async function addCustomChip(groupKey, text){
  if(!text || !text.trim()) return;
  text = text.trim();
  if(!_customChipsCache[groupKey]) _customChipsCache[groupKey] = [];
  const arr = _customChipsCache[groupKey];
  const existing = arr.find(x=>x.text===text);
  if(existing){
    existing.count = (existing.count||0)+1;
    existing.lastUsed = Date.now();
  } else {
    arr.push({ text, count:1, lastUsed:Date.now() });
    // 容量上限 20：超出删 count 最低且 lastUsed 最旧的
    if(arr.length > 20){
      arr.sort((a,b)=> (a.count-b.count) || (a.lastUsed-b.lastUsed));
      arr.splice(0, arr.length-20);
    }
  }
  await saveCustomChips();
}

/** 从某组删除一个自定义 chip */
async function removeCustomChip(groupKey, text){
  if(!_customChipsCache[groupKey]) return;
  _customChipsCache[groupKey] = _customChipsCache[groupKey].filter(x=>x.text!==text);
  await saveCustomChips();
}

/** 取某组应显示的自定义条目（count 降序 → lastUsed 降序，最多 10 条） */
function getCustomChipOptions(groupKey){
  const arr = _customChipsCache[groupKey] || [];
  return arr.slice()
    .sort((a,b)=> (b.count-a.count) || (b.lastUsed-a.lastUsed))
    .slice(0,10)
    .map(x=>x.text);
}

function todayISO(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}

// 创建一个可多选 chip 组（含自填 + 持久化）。
// groupKey: DB 存储的分组键（可选，不传则不持久化）
// selArr: 状态数组引用（当前选中的内置项）
// customArr: 当前会话内选中的自定义项（同步到 inquiryState）
function makeChipGroup(options, selArr, customArr, groupKey){
  const group=document.createElement("div"); group.className="chip-group";
  options.forEach(opt=>{
    const c=document.createElement("button"); c.className="chip"; c.textContent=opt;
    if(selArr.includes(opt)) c.classList.add("on");
    c.addEventListener("click", ()=>{
      if(selArr.includes(opt)){ const i=selArr.indexOf(opt); selArr.splice(i,1); c.classList.remove("on"); }
      else { selArr.push(opt); c.classList.add("on"); }
    });
    group.appendChild(c);
  });

  // 「✏️ 自填」按钮（先 append，后面自定义 chip 都 insertBefore 它）
  const add=document.createElement("button"); add.className="chip add-chip"; add.textContent="✏️ 自填";
  group.appendChild(add);

  // 已选的自定义项（来自 inquiryState，本次已点选过的），插在 add 之前
  customArr.forEach(val=> group.insertBefore(
    makePersistCustomChip(val, customArr, group, groupKey, true), add
  ));

  // 持久化的历史自定义项（未在 customArr 中的，从 DB 缓存追加），插在 add 之前
  if(groupKey){
    const histItems = getCustomChipOptions(groupKey).filter(t=> !customArr.includes(t));
    histItems.forEach(val=>{
      group.insertBefore(
        makePersistCustomChip(val, customArr, group, groupKey, false),
        add
      );
    });
  }

  add.addEventListener("click", ()=>{
    const inp=document.createElement("input"); inp.className="chip-inline-input"; inp.placeholder="输入后回车";
    group.insertBefore(inp, add); inp.focus();
    const commit=async ()=>{
      const v=(inp.value||"").trim(); inp.remove();
      if(!v) return;
      if(!customArr.includes(v)){
        customArr.push(v);
        if(groupKey) await addCustomChip(groupKey, v);
        group.insertBefore(makePersistCustomChip(v, customArr, group, groupKey, true), add);
      }
    };
    inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); commit(); } else if(e.key==="Escape"){ inp.remove(); } });
    inp.addEventListener("blur", commit);
  });
  // add button was already appended above; no need to re-append
  return group;
}

// 一个持久化自定义 chip（"on"=已选中；含 × 删除按钮；长按也可触发删除）
function makePersistCustomChip(val, customArr, group, groupKey, startSelected){
  const c=document.createElement("button");
  c.className="chip custom"+(startSelected?" on":"");
  // 内容：文字 + × 按钮
  const textSpan=document.createElement("span"); textSpan.textContent=val;
  const delX=document.createElement("span"); delX.className="chip-del-x"; delX.textContent="×";
  delX.title="删除此自填项";
  c.appendChild(textSpan); c.appendChild(delX);

  // 点文字部分 = 切换选中
  textSpan.addEventListener("click",(e)=>{
    e.stopPropagation();
    if(customArr.includes(val)){
      const i=customArr.indexOf(val); customArr.splice(i,1); c.classList.remove("on");
    } else {
      customArr.push(val); c.classList.add("on");
      if(groupKey) addCustomChip(groupKey, val);
    }
  });
  // 点 × = 从持久化删除并移除 DOM
  delX.addEventListener("click", async (e)=>{
    e.stopPropagation();
    const i=customArr.indexOf(val); if(i>=0) customArr.splice(i,1);
    if(groupKey) await removeCustomChip(groupKey, val);
    c.remove();
  });
  // 长按也触发删除（适老化：不依赖右键）
  let _lpTimer=null;
  c.addEventListener("pointerdown",()=>{ _lpTimer=setTimeout(async ()=>{
    const i=customArr.indexOf(val); if(i>=0) customArr.splice(i,1);
    if(groupKey) await removeCustomChip(groupKey, val);
    c.remove();
  }, 700); });
  c.addEventListener("pointerup",()=>clearTimeout(_lpTimer));
  c.addEventListener("pointercancel",()=>clearTimeout(_lpTimer));
  return c;
}

// 旧版 makeCustomChip 保留（内部已被 makePersistCustomChip 替代，可能仍被调用）
function makeCustomChip(val, customArr, group){
  return makePersistCustomChip(val, customArr, group, null, true);
}

function ensureArr(obj, key){ if(!Array.isArray(obj[key])) obj[key]=[]; return obj[key]; }

// 小工具：带标签的字段行
function fieldRow(label, makeEl){
  const wrap=document.createElement("div"); wrap.style.marginTop="10px";
  const l=document.createElement("div"); l.style.cssText="font-weight:600;margin-bottom:4px;color:var(--ink);"; l.textContent=label;

// 把一个 chip 组的「内置选中 + 自定义」合并成顿号串
function joinChips(selArr, customArr){
  const all=[].concat(selArr||[], customArr||[]);
  return all.filter(Boolean).join("、");
}

function composeInquiryText(){
  const S=inquiryState;
  const lines=["【问诊单】"];

  // 主诉
  if(S.chiefNone) lines.push("主诉：无特定主诉（日常调理/学习咨询）");
  else if(S.chiefText && S.chiefText.trim()) lines.push("主诉："+S.chiefText.trim());

  // 病程演化（按时间叙述）
  const evo=[];
  if(S.visitDate) evo.push("就诊日期："+S.visitDate);
  if(S.onsetTime && S.onsetTime.trim()) evo.push("起病："+S.onsetTime.trim());
  if(S.onsetDesc && S.onsetDesc.trim()) evo.push("初起表现："+S.onsetDesc.trim());
  const stages=(S.stages||[]).filter(st=>(st.time&&st.time.trim())||(st.change&&st.change.trim()));
  if(stages.length){
    evo.push("演变过程：");
    stages.forEach(st=>{
      const t=(st.time||"").trim(), c=(st.change||"").trim();
      evo.push("  · "+(t?(t+" "):"")+c);
    });
  }
  if(S.curState && S.curState.trim()) evo.push("当前状态："+S.curState.trim());
  if(evo.length){ lines.push("\n【病程演化】"); evo.forEach(e=>lines.push(e)); }

  // 通用 chip 组
  const symLines=[];
  INQUIRY_SCHEMA.forEach(f=>{
    const s=joinChips(S.chips[f.id], S.custom[f.id]);
    if(s) symLines.push(f.label+"："+s);
  });
  if(symLines.length){ lines.push("\n【四诊信息】"); symLines.forEach(x=>lines.push(x)); }

  // 脉象
  const maiLines=[];
  const overall=joinChips(S.pulseOverall, S.custom["pulseOverall"]);
  if(overall) maiLines.push("整体脉象："+overall);
  if(S.pulseDetailOpen){
    PULSE_POSITIONS.forEach(pos=>{
      const s=joinChips(S.pulseDetail[pos.id], S.custom["pulse_"+pos.id]);
      if(s) maiLines.push(pos.label+"："+s);
    });
  }
  if(maiLines.length){ lines.push("\n【脉诊】"); maiLines.forEach(x=>lines.push(x)); }

  // 既往 / 治疗
  if(S.jiwang && S.jiwang.trim()) lines.push("\n既往史与用药："+S.jiwang.trim());
  if(S.zhiliao && S.zhiliao.trim()) lines.push("已做治疗及反应："+S.zhiliao.trim());

  lines.push("\n请据以上信息，按六经辨证进行问诊推演：归纳病机、判断病位、给出辨证结论与立法、推荐主方并说明方证相应，并指出还需追问以鉴别的关键点。若信息不足以定方，请明确说出还缺哪些关键信息。");
  return lines.join("\n");
}

// 渲染 key 草稿列表（每行：序号 / 标签 / key / 上移 / 下移 / 删除）
function renderKeyListEditor(){
  const box=$("#keyList"); if(!box) return;
  box.innerHTML="";
  if(!settingsKeysDraft.length){
    box.innerHTML='<div class="hint" style="margin:6px 0;">还没有 key（当前为演示模式）。点下面「添加一个 key」开始。</div>';
    return;
  }
  settingsKeysDraft.forEach((k,i)=>{
    const row=document.createElement("div"); row.className="key-row"; row.dataset.i=i;
    row.innerHTML=
      '<span class="k-idx">'+(i+1)+'</span>'+
      '<input class="k-label" type="text" placeholder="标签（如 妈妈的号）" value="'+esc(k.label||"")+'">'+
      '<input class="k-key" type="password" placeholder="粘贴 Gemini API key" value="'+esc(k.key||"")+'">'+
      '<button class="k-btn up" title="上移">↑</button>'+
      '<button class="k-btn down" title="下移">↓</button>'+
      '<button class="k-btn del" title="删除">🗑</button>';
    row.querySelector(".up").addEventListener("click",()=>{ syncKeyDraftFromDOM(); if(i>0){ const t=settingsKeysDraft[i-1]; settingsKeysDraft[i-1]=settingsKeysDraft[i]; settingsKeysDraft[i]=t; } renderKeyListEditor(); });
    row.querySelector(".down").addEventListener("click",()=>{ syncKeyDraftFromDOM(); if(i<settingsKeysDraft.length-1){ const t=settingsKeysDraft[i+1]; settingsKeysDraft[i+1]=settingsKeysDraft[i]; settingsKeysDraft[i]=t; } renderKeyListEditor(); });
    row.querySelector(".del").addEventListener("click",()=>{ syncKeyDraftFromDOM(); settingsKeysDraft.splice(i,1); renderKeyListEditor(); });
    box.appendChild(row);
  });
}
// 把 DOM 里各输入框的值同步回草稿（排序/删除前先 sync，避免丢失编辑）
function syncKeyDraftFromDOM(){
  const rows=$$("#keyList .key-row");
  rows.forEach(row=>{
    const i=parseInt(row.dataset.i,10);
    if(settingsKeysDraft[i]){
      settingsKeysDraft[i].label = row.querySelector(".k-label").value.trim();
      settingsKeysDraft[i].key   = row.querySelector(".k-key").value.trim();
    }
  });
}
// 收集表单里有效的 key（去掉空 key），用于测试连接与保存
function collectKeysFromForm(){
  syncKeyDraftFromDOM();
  return settingsKeysDraft
    .map((k,i)=>({ label:(k.label||"").trim() || ("key "+(i+1)), key:(k.key||"").trim() }))
    .filter(k=>k.key);
}

// 打开模板/人设指令编辑器
function openTplEditor(tplKey, name){
  const defText = tplKey==="__default__" ? DEFAULT_SYSTEM : (TEMPLATES.find(t=>t.key===tplKey)||{}).system||"";
  const ov=State.settings.tplOverrides||{};
  const cur = (ov[tplKey] && ov[tplKey].trim()) ? ov[tplKey] : defText;
  $("#tplEditTitle").textContent="编辑指令 · "+name;
  const ta=$("#tplEditTa"); ta.value=cur;
  const saveBtn=$("#tplEditSave"), resetBtn=$("#tplEditReset");
  saveBtn.onclick = async ()=>{
    const val=ta.value.trim();
    if(!val){ toast("指令不能为空"); return; }
    // 与默认一致则视为未自定义（不存覆盖）
    if(val===defText.trim()){ delete State.settings.tplOverrides[tplKey]; }
    else { State.settings.tplOverrides[tplKey]=val; }
    await DB.setSetting("tplOverrides", State.settings.tplOverrides);
    $("#tplEditOverlay").classList.remove("show");
    renderTplOverrideEditor();
    toast("已保存");
  };
  resetBtn.onclick = ()=>{ ta.value=defText; };
  $("#tplEditOverlay").classList.add("show");
}

// 把 AI 消息内容中的 quiz 块降级为纯文本（用于 txt 导出）
function quizToPlainText(content){
  return (content||"").replace(/```quiz\n([\s\S]*?)```/g, (match, raw)=>{
    try{
      const data = repairAndParseJSON(raw);
      if(data && Array.isArray(data.questions)){
        return data.questions.map(q=>{
          const opts = (q.options||[]).map(stripOptPrefix);
          const letters = opts.map((o,i)=> (OPTION_LETTERS[i]||String.fromCharCode(65+i))+". "+o).join("\n    ");
          return "[题"+q.id+(q.tag?" · "+q.tag:"")+"] "+q.stem+"\n    "+letters;
        }).join("\n\n");
      }
    }catch(_){}
    return raw;
  });
}

/* ---------- 通用对话框（确认/输入/提示） ---------- */
function confirmDialog(title, msg){
  return new Promise(res=>{
    $("#confirmTitle").textContent=title; $("#confirmMsg").textContent=msg;
    const ov=$("#confirmOverlay"); ov.classList.add("show");
    const yes=$("#confirmYes"), no=$("#confirmNo");
    const cleanup=()=>{ ov.classList.remove("show"); yes.onclick=null; no.onclick=null; };
    yes.onclick=()=>{ cleanup(); res(true); };
    no.onclick=()=>{ cleanup(); res(false); };
  });
}
function alertDialog(title, msg){
  return new Promise(res=>{
    $("#confirmTitle").textContent=title; $("#confirmMsg").textContent=msg;
    const ov=$("#confirmOverlay"); ov.classList.add("show");
    const yes=$("#confirmYes"), no=$("#confirmNo");
    no.style.display="none"; yes.textContent="知道了"; yes.classList.remove("danger");
    const cleanup=()=>{ ov.classList.remove("show"); no.style.display=""; yes.textContent="确定"; yes.classList.add("danger"); yes.onclick=null; };
    yes.onclick=()=>{ cleanup(); res(true); };
  });
}
function promptDialog(title, def){
  return new Promise(res=>{
    $("#promptTitle").textContent=title;
    const inp=$("#promptInput"); inp.value=def||"";
    const ov=$("#promptOverlay"); ov.classList.add("show");
    setTimeout(()=>{ inp.focus(); inp.select(); },50);
    const yes=$("#promptYes"), no=$("#promptNo");
    const cleanup=()=>{ ov.classList.remove("show"); yes.onclick=null; no.onclick=null; inp.onkeydown=null; };
    yes.onclick=()=>{ const v=inp.value; cleanup(); res(v); };
    no.onclick=()=>{ cleanup(); res(null); };
    inp.onkeydown=(e)=>{ if(e.key==="Enter"){ const v=inp.value; cleanup(); res(v); } };
  });
}

function doSend(){
  const box=$("#inputBox");
  const text=box.value;
  if(!text.trim()) return;
  // edit fork：若标记了 editParent，则发送到该父节点
  let opts={};
  if(box.dataset.editParent){
    opts.parentId = box.dataset.editParent==="ROOT" ? null : box.dataset.editParent;
    delete box.dataset.editParent;
  }
  box.value=""; autoGrow(box);
  sendMessage(text, opts);
}

/* ---------- PWA：内联 manifest + service worker ---------- */
function setupPWA(){
  // 仅在 http(s) 下注入 PWA；file:// 协议下 manifest/blob 会在 DevTools 报错，直接跳过
  if(!location.protocol.startsWith("http")) return;
  try{
    const manifest = {
      name:"中医学习助手", short_name:"中医助手", lang:"zh-CN",
      start_url:".", display:"standalone", orientation:"any",
      background_color:"#f5f0e6", theme_color:"#3a5a40",
      icons:[{
        // 内联 SVG 图标（绿底 + 草字），data URI
        src:"data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#3a5a40"/><text x="256" y="340" font-size="300" text-anchor="middle" fill="#f5f0e6" font-family="serif">医</text></svg>'
        ))),
        sizes:"512x512", type:"image/svg+xml", purpose:"any"
      }]
    };
    const mBlob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(mBlob);
    document.head.appendChild(link);

    // 简单 service worker（缓存当前页，离线可打开壳）。file:// 下不支持，忽略错误。
    if("serviceWorker" in navigator && location.protocol.startsWith("http")){
      const swCode = [
        'const C="tcm-cache-v1";',
        'self.addEventListener("install", e=> self.skipWaiting());',
        'self.addEventListener("activate", e=> self.clients.claim());',
        'self.addEventListener("fetch", e=>{',
        '  const u=new URL(e.request.url);',
        '  if(u.origin===location.origin && e.request.method==="GET"){',
        '    e.respondWith(',
        '      caches.open(C).then(function(c){',
        '        return c.match(e.request).then(function(r){',
        '          return r || fetch(e.request).then(function(resp){ c.put(e.request, resp.clone()); return resp; }).catch(function(){ return caches.match("./"); });',
        '        });',
        '      })',
        '    );',
        '  }',
        '});'
      ].join("\n");
      const swUrl=URL.createObjectURL(new Blob([swCode],{type:"text/javascript"}));
      navigator.serviceWorker.register(swUrl).catch(function(){ /* 忽略 */ });
    }
  }catch(e){ /* PWA 失败不影响主功能 */ }
}

/* ==================== ⑥ 医案系统（患者档案 / 复诊 / 存入医案） ====================
   patient 记录：{id, name, gender, birthYear, ageText, constitution, taboos,
                 visits:[{id, date, summary, createdAt}], createdAt, updatedAt}
   visits 按 date+createdAt 排序，详情视图倒序展示。
================================================================ */

/* ---------- 侧边栏 tab 切换 ---------- */
function switchSbTab(tab){
  State.sbTab = tab;
  $$("#sidebar .sb-tab").forEach(b=> b.classList.toggle("active", b.dataset.tab===tab));
  $("#tabChat").style.display    = tab==="chat" ? "flex" : "none";
  $("#tabPatient").style.display = tab==="patient" ? "flex" : "none";
  if(tab==="patient") renderPatientList();
}

/* ---------- 患者数据加载 / 列表 ---------- */
async function refreshPatients(){
  State.patients = await DB.allPatients();
  if(State.sbTab==="patient") renderPatientList();
}
// 取某患者最近一次就诊日期（已排序后最后一条）
function lastVisitDate(pat){
  const vs = (pat.visits||[]);
  if(!vs.length) return "尚无就诊";
  const sorted = vs.slice().sort((a,b)=> (a.date||"").localeCompare(b.date||"") || (a.createdAt||0)-(b.createdAt||0));
  return (sorted[sorted.length-1].date) || "日期未记录";
}
function renderPatientList(){
  const box=$("#patientList"); if(!box) return; box.innerHTML="";
  if(!State.patients.length){
    box.innerHTML='<div style="padding:20px;color:var(--ink-soft);text-align:center;">还没有患者档案<br>点上面的「新建患者」开始建档</div>';
    return;
  }
  State.patients.forEach(p=>{
    const div=document.createElement("div");
    div.className="pat-item"+(p.id===State.viewingPatientId?" active":"");
    div.innerHTML=
      '<div class="title">'+esc(p.name||"未命名")+'</div>'+
      '<div class="meta"><span>最近：'+esc(lastVisitDate(p))+'</span>'+
      '<span>'+((p.visits||[]).length)+' 次就诊</span></div>';
    div.addEventListener("click", ()=> openPatientDetail(p.id));
    box.appendChild(div);
  });
}

/* ---------- 新建 / 编辑 患者资料 ---------- */
// patientId 为空 = 新建；onSaved 回调（可选）传入保存后的患者对象
function openPatientEdit(patientId, onSaved){
  const editing = patientId ? State.patients.find(p=>p.id===patientId) : null;
  $("#patientEditTitle").textContent = editing ? "编辑患者资料" : "新建患者";
  const p = editing || {};
  const body=$("#patientEditBody");
  body.innerHTML=
    '<div class="field"><label>称呼 *</label>'+
      '<input type="text" id="peName" placeholder="如：王阿姨 / 张先生" value="'+esc(p.name||"")+'"></div>'+
    '<div class="field"><label>性别</label>'+
      '<div class="chip-group" id="peGender">'+
        ['男','女','其他'].map(g=>'<button class="chip'+(p.gender===g?' on':'')+'" data-g="'+g+'">'+g+'</button>').join('')+
      '</div></div>'+
    '<div class="field"><label>出生年份（用于自动算年龄，可留空）</label>'+
      '<input type="number" id="peBirth" min="1900" max="'+(new Date().getFullYear())+'" placeholder="如 1965" value="'+(p.birthYear||"")+'"></div>'+
    '<div class="field"><label>年龄描述（若不填出生年份，可在此手写）</label>'+
      '<input type="text" id="peAge" placeholder="如 约六十岁" value="'+esc(p.ageText||"")+'"></div>'+
    '<div class="field"><label>体质 / 基础情况</label>'+
      '<textarea id="peCons" rows="2" placeholder="如：素体阳虚，易疲劳，有慢性胃病">'+esc(p.constitution||"")+'</textarea></div>'+
    '<div class="field"><label>禁忌 / 慎用</label>'+
      '<textarea id="peTaboo" rows="2" placeholder="如：孕妇 / 对某药过敏 / 忌寒凉">'+esc(p.taboos||"")+'</textarea></div>';
  // 性别 chip 单选
  $$("#peGender .chip").forEach(b=> b.addEventListener("click", ()=>{
    const wasOn=b.classList.contains("on");
    $$("#peGender .chip").forEach(x=>x.classList.remove("on"));
    if(!wasOn) b.classList.add("on");
  }));
  const saveBtn=$("#patientEditSave");
  saveBtn.onclick = async ()=>{
    const name=$("#peName").value.trim();
    if(!name){ toast("请至少填写称呼"); return; }
    const genderOn=$("#peGender .chip.on");
    const birthRaw=parseInt($("#peBirth").value,10);
    const rec = editing || { id:uid(), visits:[], createdAt:Date.now() };
    rec.name=name;
    rec.gender = genderOn ? genderOn.dataset.g : "";
    rec.birthYear = (birthRaw && birthRaw>1900 && birthRaw<=new Date().getFullYear()) ? birthRaw : null;
    rec.ageText = $("#peAge").value.trim();
    rec.constitution = $("#peCons").value.trim();
    rec.taboos = $("#peTaboo").value.trim();
    rec.updatedAt = Date.now();
    if(!Array.isArray(rec.visits)) rec.visits=[];
    await DB.putPatient(rec);
    await refreshPatients();
    $("#patientEditOverlay").classList.remove("show");
    toast(editing ? "资料已更新" : "患者已建档");
    if(onSaved) onSaved(rec);
    // 若详情面板正开着这位患者，刷新
    if(State.viewingPatientId===rec.id) openPatientDetail(rec.id);
  };
  $("#patientEditOverlay").classList.add("show");
}

/* ---------- 患者详情视图（基本信息 + 就诊时间线） ---------- */
async function openPatientDetail(patientId){
  let pat = State.patients.find(p=>p.id===patientId);
  if(!pat){ pat = await DB.getPatient(patientId); }
  if(!pat){ toast("找不到该患者"); return; }
  State.viewingPatientId = pat.id;
  renderPatientList();
  $("#patientTitle").textContent = "📂 "+(pat.name||"患者档案");
  const body=$("#patientBody");
  // 基本信息
  let html='<div class="pat-info-grid" style="display:block;margin-bottom:20px;">'+
    '<div style="line-height:2;">'+
      '<div><strong style="color:var(--primary);">性别：</strong>'+esc(pat.gender||"未记录")+'</div>'+
      '<div><strong style="color:var(--primary);">年龄：</strong>'+
        esc(pat.birthYear ? ((new Date().getFullYear()-pat.birthYear)+"岁（"+pat.birthYear+"年生）") : (pat.ageText||"未记录"))+'</div>'+
      '<div><strong style="color:var(--primary);">体质/基础：</strong>'+esc(pat.constitution||"未记录")+'</div>'+
      '<div><strong style="color:var(--primary);">禁忌/慎用：</strong>'+esc(pat.taboos||"未记录")+'</div>'+
    '</div></div>';
  // 就诊时间线（倒序）
  const visits=(pat.visits||[]).slice().sort((a,b)=>
    (b.date||"").localeCompare(a.date||"") || (b.createdAt||0)-(a.createdAt||0));
  html+='<div style="font-weight:700;color:var(--primary);font-size:var(--fs-lg);margin-bottom:10px;">就诊记录（'+visits.length+' 次）</div>';
  if(!visits.length){
    html+='<div style="color:var(--ink-soft);padding:10px 0;">暂无就诊记录。点下方「开始复诊」可建立新会话，对话后用顶栏「📥 存入医案」归档。</div>';
  } else {
    visits.forEach(v=>{
      html+='<div class="visit-card" data-vid="'+v.id+'">'+
        '<div class="vc-head"><span class="vc-date">'+esc(v.date||"日期未记录")+'</span><span style="color:var(--ink-soft);">▾ 展开/收起</span></div>'+
        '<div class="vc-body"><div class="vc-text">'+esc(v.summary||"（无摘要）")+'</div>'+
          '<div class="vc-acts">'+
            '<button class="btn ghost small" data-vact="edit">✏️ 编辑</button>'+
            '<button class="btn danger small" data-vact="del">🗑 删除</button>'+
          '</div></div>'+
      '</div>';
    });
  }
  body.innerHTML=html;
  // 就诊卡展开/收起 + 编辑/删除
  $$("#patientBody .visit-card").forEach(card=>{
    const vid=card.dataset.vid;
    card.querySelector(".vc-head").addEventListener("click", ()=> card.classList.toggle("open"));
    const eb=card.querySelector('[data-vact="edit"]');
    const db=card.querySelector('[data-vact="del"]');
    if(eb) eb.addEventListener("click",(e)=>{ e.stopPropagation(); openVisitEdit(pat.id, vid); });
    if(db) db.addEventListener("click", async (e)=>{
      e.stopPropagation();
      const ok=await confirmDialog("删除就诊记录","确定删除这条就诊记录吗？删除后无法恢复。");
      if(!ok) return;
      pat.visits=(pat.visits||[]).filter(x=>x.id!==vid);
      pat.updatedAt=Date.now();
      await DB.putPatient(pat); await refreshPatients();
      openPatientDetail(pat.id);
      toast("已删除");
    });
  });
  // 底部操作按钮
  $("#patientFoot").innerHTML=
    '<button class="btn ghost" id="pdEdit">✏️ 编辑资料</button>'+
    '<button class="btn ghost" id="pdPrint">🖨 打印医案</button>'+
    '<button class="btn" id="pdRevisit">🩺 开始复诊</button>';

  $("#pdPrint").onclick = ()=> printPatientCase(pat.id);
  $("#pdRevisit").onclick = ()=> startRevisit(pat.id);
  $("#patientOverlay").classList.add("show");
}

/* ---------- 存入医案：Flash 起草摘要 → 编辑 → 选患者归档 ---------- */
const SAVE_CASE_PROMPT =
  "请把以下这段中医对话整理成一份【结构化就诊摘要】，严格按下列固定栏目逐条输出，每行一项：\n"+
  "就诊日期：\n主诉：\n四诊要点：\n辨证：\n处方或穴位：\n医嘱与反馈：\n\n"+
  "要求：①只依据对话中实际出现的信息，缺失的栏目一律写「未记录」，禁止编造或推测补全；"+
  "②语言精炼，用要点式，不要展开议论；③不要输出本栏目以外的任何额外文字。\n\n对话内容如下：\n";

// 把当前会话路径拼成纯文本（给 Flash 起草用）
function currentConvPlainText(){
  const path=computePath();
  return path.map(m=> (m.role==="user"?"【提问】":"【老师】")+"\n"+m.content).join("\n\n");
}
const EMPTY_CASE_TEMPLATE =
  "就诊日期："+todayISO()+"\n主诉：\n四诊要点：\n辨证：\n处方或穴位：\n医嘱与反馈：";

async function openSaveCase(){
  if(!State.currentSessionId || computePath().length===0){ toast("当前没有可存档的对话"); return; }
  const body=$("#saveCaseBody");
  // 选患者区：默认沿用当前会话关联患者
  const curSess=State.sessions.find(s=>s.id===State.currentSessionId);
  const presetPid = curSess ? curSess.patientId : null;
  body.innerHTML=
    '<div class="field"><label>就诊摘要（可自由修改）</label>'+
      '<div class="hint" id="scStatus">正在用快速模式起草摘要…</div>'+
      '<textarea id="scDraft" class="draft-area" placeholder="摘要正在生成…"></textarea></div>'+
    '<div class="field"><label>归入患者</label>'+
      '<div class="hint">选择已有患者，或新建一位。</div>'+
      '<select id="scPatient" style="margin-bottom:10px;"></select>'+
      '<button class="btn ghost small" id="scNewPatient">➕ 新建患者</button></div>';
  // 填充患者下拉
  function fillPatientSelect(selPid){
    const sel=$("#scPatient"); sel.innerHTML="";
    State.patients.forEach(p=>{
      const o=document.createElement("option"); o.value=p.id; o.textContent=p.name||"未命名"+"（"+((p.visits||[]).length)+"次）";
      o.textContent=(p.name||"未命名")+"（"+((p.visits||[]).length)+"次就诊）";
      if(p.id===selPid) o.selected=true;
      sel.appendChild(o);
    });
    if(!State.patients.length){
      const o=document.createElement("option"); o.value=""; o.textContent="（暂无患者，请先新建）";
      sel.appendChild(o);
    }
  }
  fillPatientSelect(presetPid);
  $("#scNewPatient").onclick = ()=> openPatientEdit(null, (rec)=>{ fillPatientSelect(rec.id); });
  $("#saveCaseOverlay").classList.add("show");

  const draftEl=$("#scDraft"), statusEl=$("#scStatus");
  // 演示模式（无任何 key）：直接给空白模板手填
  if(!State.settings.keys || !State.settings.keys.length){
    statusEl.textContent="演示模式：未连接模型，已给出空白模板，请手动填写。";
    draftEl.value=EMPTY_CASE_TEMPLATE;
    return;
  }
  // 用 Flash 起草（支持多 key 故障转移）
  draftEl.value="";
  let acc="", usedKeyIdx=State.settings.activeKeyIndex;
  API.send({
    keys:State.settings.keys, startIndex:State.settings.activeKeyIndex,
    modelId:State.settings.modelFlash,   // 起草固定用快速模式，省额度
    systemText:"你是一位严谨的中医病历整理助手，只做信息归纳，不做诊断发挥。",
    genConfig:buildGenConfig(),
    contents:[{ role:"user", parts:[{ text: SAVE_CASE_PROMPT + currentConvPlainText() }] }],
    onUsedKey: async (idx)=>{ usedKeyIdx=idx; await persistActiveKey(idx); },
    onDelta:(c)=>{ acc+=c; draftEl.value=acc; draftEl.scrollTop=draftEl.scrollHeight; },
    onDone: async ({text,usage,demo})=>{
      draftEl.value=(text||acc||"").trim()||EMPTY_CASE_TEMPLATE;
      statusEl.textContent="摘要已生成，请核对修改后归档。";
      if(!demo && usage) await accrueUsage(usage, usedKeyIdx);
    },
    onError:(err)=>{
      const info=API.explainError(err);
      statusEl.innerHTML='<span style="color:var(--danger);">起草失败：'+esc(info.main)+'（已填入空白模板，可手动填写）</span>';
      if(!draftEl.value.trim()) draftEl.value=EMPTY_CASE_TEMPLATE;
    }
  });
}

// 确认入档：把摘要写进所选患者的 visits
async function confirmSaveCase(){
  const draft=$("#scDraft").value.trim();
  if(!draft){ toast("摘要不能为空"); return; }
  const pid=$("#scPatient").value;
  if(!pid){ toast("请先选择或新建一位患者"); return; }
  const pat=State.patients.find(p=>p.id===pid) || await DB.getPatient(pid);
  if(!pat){ toast("找不到该患者"); return; }
  // 从摘要里抽就诊日期，抽不到用今天
  let date=todayISO();
  const m=draft.match(/就诊日期[：:]\s*(\S+)/);
  if(m && m[1] && m[1]!=="未记录"){
    const norm=m[1].replace(/年|月/g,"-").replace(/日/g,"").replace(/\//g,"-");
    if(/^\d{4}-\d{1,2}(-\d{1,2})?$/.test(norm)) date=norm;
  }
  if(!Array.isArray(pat.visits)) pat.visits=[];
  pat.visits.push({ id:uid(), date, summary:draft, createdAt:Date.now() });
  pat.updatedAt=Date.now();
  await DB.putPatient(pat);
  // 把当前会话关联到该患者（便于后续复诊横幅）
  const curSess=State.sessions.find(s=>s.id===State.currentSessionId);
  if(curSess && !curSess.patientId){ curSess.patientId=pat.id; await DB.putSession(curSess); }
  await refreshPatients(); await refreshSessions();
  $("#saveCaseOverlay").classList.remove("show");
  renderStream(); // 刷新患者关联横幅
  toast("已存入「"+(pat.name||"患者")+"」的医案");
}

/* ---------- 打印整本医案 ---------- */
function printPatientCase(patientId){
  const pat=State.patients.find(p=>p.id===patientId); if(!pat) return;
  const w=window.open("","_printcase");
  if(!w){ toast("浏览器拦截了打印窗口，请允许弹出窗口"); return; }
  const age = pat.birthYear ? ((new Date().getFullYear()-pat.birthYear)+"岁（"+pat.birthYear+"年生）") : (pat.ageText||"未记录");
  const visits=(pat.visits||[]).slice().sort((a,b)=>
    (a.date||"").localeCompare(b.date||"") || (a.createdAt||0)-(b.createdAt||0));
  let rows="";
  visits.forEach((v,i)=>{
    rows+='<div class="visit"><div class="vh">第'+(i+1)+'次就诊 · '+esc(v.date||"日期未记录")+'</div>'+
      '<div class="vb">'+esc(v.summary||"（无摘要）").replace(/\n/g,"<br>")+'</div></div>';
  });
  if(!rows) rows='<div style="color:#888;">暂无就诊记录</div>';
  w.document.write(
  '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>医案·'+esc(pat.name||"")+'</title><style>'+
  '@page{size:A4;margin:18mm;} body{font-family:"Songti SC","SimSun",serif;color:#222;line-height:1.8;font-size:14px;}'+
  'h1{text-align:center;color:#3a5a40;border-bottom:2px solid #3a5a40;padding-bottom:10px;}'+
  '.info{background:#f7f3ea;padding:10px 14px;border-radius:8px;margin:14px 0;}'+
  '.info div{margin:2px 0;} .visit{margin:14px 0;page-break-inside:avoid;}'+
  '.vh{font-weight:bold;color:#3a5a40;border-left:4px solid #9c6644;padding-left:10px;margin-bottom:6px;}'+
  '.vb{padding:6px 14px;background:#eef3ea;border-radius:8px;}'+
  '</style></head><body><h1>医案 · '+esc(pat.name||"")+'</h1>'+
  '<div class="info">'+
    '<div><b>性别：</b>'+esc(pat.gender||"未记录")+'</div>'+
    '<div><b>年龄：</b>'+esc(age)+'</div>'+
    '<div><b>体质/基础：</b>'+esc(pat.constitution||"未记录")+'</div>'+
    '<div><b>禁忌/慎用：</b>'+esc(pat.taboos||"未记录")+'</div>'+
  '</div>'+rows+
  '<script>window.onload=function(){setTimeout(function(){window.print();},300);};<\/script></body></html>');
  w.document.close();
}

/* ---------- 初始化 ---------- */
async function init(){
  setupGlobalErrorHandlers();
  await loadSettings();
  await loadCustomChips();   // 加载持久化自定义 chip
  renderTemplateBar();
  renderQuota();
  wireEvents();
  setupPWA();
  await refreshPatients();
  await refreshSessions();
  if(State.sessions.length){ await openSession(State.sessions[0].id); }
  else { renderStream(); }   // 显示空状态
  // 桌面默认展开侧边栏
  if(window.innerWidth>820){ $("#sidebar").classList.remove("collapsed"); }
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
